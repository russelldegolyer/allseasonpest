<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 35% 45%, rgba(255,40,40,.05), transparent 24%),
        radial-gradient(circle at 72% 57%, rgba(255,255,255,.045), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
      touch-action:none;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 35% 45%, rgba(0,0,0,.02) 0%, rgba(0,0,0,.14) 68%, rgba(0,0,0,.28) 100%),
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.12));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 6px rgba(255,60,60,.12))
        drop-shadow(0 0 8px rgba(255,255,255,.08))
        drop-shadow(0 0 18px rgba(255,255,255,.03));
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let frame = 0;

    let systems = [];
    let draggingRed = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function dist(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      initSystems();
    }

    function createSystem(x, y, colorName, colorRGB, glowRGB) {
      const mobile = window.innerWidth < 768;
      const spokeCount = mobile ? 15 : 18;
      const ringCount = mobile ? 8 : 10;
      const maxRadius = Math.max(w, h) * (mobile ? 0.47 : 0.42);

      const spokes = [];
      const angleStep = (Math.PI * 2) / spokeCount;

      for (let i = 0; i < spokeCount; i++) {
        const angle = i * angleStep + rand(-0.09, 0.09);
        spokes.push({
          angle,
          thickness: rand(1.6, 3.1),
          alpha: rand(0.24, 0.78),
          wobble: rand(2, 7),
          wobblePhase: rand(0, Math.PI * 2),
          wobbleFreq: rand(1.5, 3.1),
          maxReach: maxRadius * rand(0.90, 1.08),
          liveReach: rand(14, 30),
          growth: rand(0.16, 0.36),
          breakStart: Math.random() < 0.22 ? rand(0.52, 0.82) : null,
          breakLen: rand(0.03, 0.07)
        });
      }

      const rings = [];
      for (let i = 0; i < ringCount; i++) {
        rings.push({
          ratio: 0.10 + i * rand(0.075, 0.088),
          alpha: rand(0.14, 0.34),
          thickness: rand(1.0, 2.15),
          sag: rand(-5, 7),
          jitter: rand(0.8, 2.8)
        });
      }

      return {
        x,
        y,
        colorName,
        colorRGB,
        glowRGB,
        spokes,
        rings,
        maxRadius,
        webProgress: 0.04,
        targetProgress: 1,
        growthRate: 0.00125,
        pulse: rand(0, Math.PI * 2)
      };
    }

    function initSystems() {
      const mobile = window.innerWidth < 768;

      systems = [
        createSystem(
          w * (mobile ? 0.37 : 0.34),
          h * (mobile ? 0.45 : 0.46),
          "red",
          "255,72,72",
          "255,30,30"
        ),
        createSystem(
          w * (mobile ? 0.74 : 0.73),
          h * (mobile ? 0.58 : 0.57),
          "white",
          "255,255,255",
          "255,255,255"
        )
      ];
    }

    function pointOnSpoke(system, spoke, t, extraSag = 0) {
      const r = spoke.liveReach * t;
      const wobble =
        Math.sin((t * spoke.wobbleFreq) + spoke.wobblePhase + frame * 0.008) *
        spoke.wobble *
        (0.16 + t * 0.26);

      const nx = Math.cos(spoke.angle + Math.PI / 2);
      const ny = Math.sin(spoke.angle + Math.PI / 2);

      return {
        x: system.x + Math.cos(spoke.angle) * r + nx * wobble,
        y: system.y + Math.sin(spoke.angle) * r + ny * (wobble + extraSag)
      };
    }

    function blocked(spoke, t) {
      if (spoke.breakStart === null) return false;
      return t >= spoke.breakStart && t <= (spoke.breakStart + spoke.breakLen);
    }

    function updateSystems() {
      systems.forEach((system) => {
        system.pulse += 0.006;
        system.webProgress = Math.min(system.targetProgress, system.webProgress + system.growthRate);

        system.spokes.forEach((spoke) => {
          const targetReach = spoke.maxReach * system.webProgress;
          if (spoke.liveReach < targetReach) {
            spoke.liveReach = Math.min(targetReach, spoke.liveReach + spoke.growth);
          }
          spoke.wobblePhase += 0.0045;
        });
      });
    }

    function drawGlow(system) {
      const g = ctx.createRadialGradient(system.x, system.y, 0, system.x, system.y, system.maxRadius * 1.06);
      g.addColorStop(0, `rgba(${system.glowRGB},0.09)`);
      g.addColorStop(0.14, `rgba(${system.glowRGB},0.04)`);
      g.addColorStop(0.35, `rgba(${system.glowRGB},0.012)`);
      g.addColorStop(1, `rgba(${system.glowRGB},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(system) {
      system.spokes.forEach((spoke) => {
        const steps = 28;
        let started = false;
        let last = null;

        ctx.beginPath();

        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          if (t > system.webProgress) break;

          if (blocked(spoke, t)) {
            started = false;
            continue;
          }

          const pt = pointOnSpoke(system, spoke, t);

          if (!started) {
            ctx.moveTo(pt.x, pt.y);
            started = true;
          } else if (last) {
            const midX = (last.x + pt.x) * 0.5;
            const midY = (last.y + pt.y) * 0.5;
            ctx.quadraticCurveTo(last.x, last.y, midX, midY);
          }

          last = pt;
        }

        ctx.strokeStyle = `rgba(${system.colorRGB},${spoke.alpha})`;
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        if (last && system.webProgress > 0.14) {
          ctx.beginPath();
          ctx.arc(last.x, last.y, Math.max(1.0, spoke.thickness * 0.36), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${system.colorRGB},${Math.min(0.58, spoke.alpha * 0.65)})`;
          ctx.fill();
        }
      });
    }

    function drawRings(system) {
      const sorted = [...system.spokes].sort((a, b) => a.angle - b.angle);

      system.rings.forEach((ring, ringIndex) => {
        if (ring.ratio > system.webProgress) return;

        const points = [];

        sorted.forEach((spoke, i) => {
          const t = ring.ratio;
          if (blocked(spoke, t)) return;
          if (spoke.liveReach * t < 18 + ringIndex * 10) return;

          const pt = pointOnSpoke(
            system,
            spoke,
            t,
            Math.sin(frame * 0.008 + i + ringIndex) * ring.jitter + ring.sag * 0.06
          );

          points.push(pt);
        });

        if (points.length < 5) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) * 0.5;
          const midY = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

        ctx.strokeStyle = `rgba(${system.colorRGB},${ring.alpha})`;
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawLightningHints(system) {
      if (system.webProgress < 0.30) return;

      const candidates = system.spokes.filter((_, i) => i % 3 === 0);

      candidates.forEach((spoke, idx) => {
        const flicker = (Math.sin(frame * 0.02 + idx * 1.7) + 1) * 0.5;
        if (flicker < 0.78) return;

        const startT = 0.18 + (idx % 3) * 0.08;
        const endT = Math.min(system.webProgress, startT + 0.16);

        ctx.beginPath();
        let started = false;

        for (let i = 0; i < 6; i++) {
          const t = startT + ((endT - startT) * i / 5);
          const p = pointOnSpoke(system, spoke, t);
          const jx = rand(-3.5, 3.5);
          const jy = rand(-3.5, 3.5);

          if (!started) {
            ctx.moveTo(p.x + jx, p.y + jy);
            started = true;
          } else {
            ctx.lineTo(p.x + jx, p.y + jy);
          }
        }

        ctx.strokeStyle = `rgba(${system.colorRGB},${0.11 + flicker * 0.15})`;
        ctx.lineWidth = 1.0;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawCrossLink() {
      const red = systems[0];
      const white = systems[1];
      if (!red || !white) return;

      const redSpokes = red.spokes.slice(3, 7);
      const whiteSpokes = white.spokes.slice(8, 12);

      for (let i = 0; i < Math.min(redSpokes.length, whiteSpokes.length); i++) {
        const rt = Math.min(red.webProgress * 0.72, 0.72);
        const wt = Math.min(white.webProgress * 0.68, 0.68);

        if (rt < 0.28 || wt < 0.28) continue;

        const p1 = pointOnSpoke(red, redSpokes[i], rt);
        const p2 = pointOnSpoke(white, whiteSpokes[i], wt);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        const mx = (p1.x + p2.x) * 0.5 + Math.sin(frame * 0.008 + i) * 14;
        const my = (p1.y + p2.y) * 0.5 - 8;
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = "rgba(255,255,255,0.045)";
        ctx.lineWidth = 1.1;
        ctx.stroke();
      }
    }

    function drawCore(system) {
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(
          system.x,
          system.y,
          6 + i * 8 + Math.sin(system.pulse + i) * 1.0,
          0,
          Math.PI * 2
        );
        ctx.strokeStyle = `rgba(${system.colorRGB},${0.16 - i * 0.035})`;
        ctx.lineWidth = 1.3;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(system.x, system.y, 4.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${system.colorRGB},0.62)`;
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      systems.forEach(drawGlow);
      systems.forEach(drawRings);
      systems.forEach(drawSpokes);
      systems.forEach(drawLightningHints);
      drawCrossLink();
      systems.forEach(drawCore);

      updateSystems();
      frame += 1;
      requestAnimationFrame(render);
    }

    function getPointerPosition(event) {
      const rect = stage.getBoundingClientRect();
      let clientX, clientY;

      if (event.touches && event.touches.length) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDrag(event) {
      const red = systems[0];
      if (!red) return;

      const pos = getPointerPosition(event);
      const hitRadius = Math.max(48, red.maxRadius * 0.18);

      if (dist(pos.x, pos.y, red.x, red.y) <= hitRadius) {
        draggingRed = true;
        dragOffsetX = pos.x - red.x;
        dragOffsetY = pos.y - red.y;
        event.preventDefault();
      }
    }

    function moveDrag(event) {
      if (!draggingRed) return;

      const red = systems[0];
      const pos = getPointerPosition(event);

      red.x = Math.min(w - 40, Math.max(40, pos.x - dragOffsetX));
      red.y = Math.min(h - 80, Math.max(40, pos.y - dragOffsetY));

      event.preventDefault();
    }

    function endDrag() {
      draggingRed = false;
    }

    stage.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", moveDrag);
    window.addEventListener("mouseup", endDrag);

    stage.addEventListener("touchstart", startDrag, { passive: false });
    window.addEventListener("touchmove", moveDrag, { passive: false });
    window.addEventListener("touchend", endDrag);

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
