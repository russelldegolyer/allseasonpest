<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 36% 44%, rgba(255,196,64,.05), transparent 18%),
        radial-gradient(circle at 70% 57%, rgba(74,211,255,.05), transparent 18%),
        radial-gradient(circle at 18% 22%, rgba(255,196,64,.018), transparent 30%),
        radial-gradient(circle at 82% 78%, rgba(74,211,255,.015), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 36% 44%, rgba(0,0,0,.02) 0%, rgba(0,0,0,.16) 70%, rgba(0,0,0,.28) 100%),
        linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.12));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 5px rgba(255,205,90,.12))
        drop-shadow(0 0 7px rgba(74,211,255,.10))
        drop-shadow(0 0 16px rgba(255,205,90,.06));
    }

    .center-glow{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 36% 44%, rgba(255,196,64,.08) 0%, rgba(255,196,64,.03) 9%, transparent 22%),
        radial-gradient(circle at 70% 57%, rgba(74,211,255,.08) 0%, rgba(74,211,255,.03) 9%, transparent 22%);
      mix-blend-mode:screen;
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>
      <div class="center-glow"></div>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    let systems = [];
    let frame = 0;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      initSystems();
    }

    function createSystem(x, y, color) {
      const mobile = window.innerWidth < 768;
      const spokeCount = mobile ? 14 : 18;
      const ringCount = mobile ? 7 : 9;
      const maxRadius = Math.max(w, h) * (mobile ? 0.26 : 0.23);

      const spokes = [];
      let angle = rand(-0.15, 0.15);

      for (let i = 0; i < spokeCount; i++) {
        angle += (Math.PI * 2 / spokeCount) + rand(-0.11, 0.11);

        spokes.push({
          angle,
          thickness: rand(0.8, 1.9),
          alpha: rand(0.26, 0.72),
          wobble: rand(3, 10),
          wobblePhase: rand(0, Math.PI * 2),
          wobbleFreq: rand(1.7, 3.8),
          maxReach: maxRadius * rand(0.86, 1.06),
          liveReach: rand(8, 22),
          growth: rand(0.18, 0.42),
          breaks: []
        });
      }

      const rings = [];
      for (let i = 0; i < ringCount; i++) {
        rings.push({
          ratio: 0.12 + i * rand(0.075, 0.095),
          alpha: rand(0.12, 0.38),
          thickness: rand(0.45, 1.15),
          sag: rand(-6, 10),
          jitter: rand(1, 4),
          reveal: rand(0.75, 1)
        });
      }

      return {
        x,
        y,
        color,
        corePulse: rand(0, Math.PI * 2),
        maxRadius,
        spokes,
        rings,
        webProgress: 0.05,
        targetProgress: 1,
        growthRate: color.name === "gold" ? 0.0018 : 0.0015,
        pulseRate: rand(0.004, 0.008),
        lightningSeeds: []
      };
    }

    function initSystems() {
      const mobile = window.innerWidth < 768;

      systems = [
        createSystem(
          w * (mobile ? 0.36 : 0.36),
          h * (mobile ? 0.44 : 0.44),
          {
            name: "gold",
            core: "255,203,92",
            line: "255,210,110",
            glow: "255,185,60"
          }
        ),
        createSystem(
          w * (mobile ? 0.68 : 0.70),
          h * (mobile ? 0.57 : 0.57),
          {
            name: "cyan",
            core: "155,235,255",
            line: "92,220,255",
            glow: "52,195,245"
          }
        )
      ];

      systems.forEach((system) => {
        system.spokes.forEach((spoke, i) => {
          if (Math.random() < 0.28) {
            const breakStart = rand(0.42, 0.82);
            spoke.breaks.push([breakStart, Math.min(0.95, breakStart + rand(0.03, 0.08))]);
          }

          if (Math.random() < 0.2 && i % 3 === 0) {
            system.lightningSeeds.push({
              spokeIndex: i,
              strength: rand(0.45, 0.8),
              lengthRatio: rand(0.16, 0.32),
              age: rand(0, 120)
            });
          }
        });
      });
    }

    function pointOnSpoke(system, spoke, t, ringSag = 0) {
      const reach = spoke.liveReach * t;
      const wobble =
        Math.sin((t * spoke.wobbleFreq) + spoke.wobblePhase + frame * 0.01) *
        spoke.wobble *
        (0.15 + t * 0.35);

      const nx = Math.cos(spoke.angle + Math.PI / 2);
      const ny = Math.sin(spoke.angle + Math.PI / 2);

      return {
        x: system.x + Math.cos(spoke.angle) * reach + nx * wobble,
        y: system.y + Math.sin(spoke.angle) * reach + ny * (wobble + ringSag)
      };
    }

    function segmentBlocked(spoke, t) {
      for (const [a, b] of spoke.breaks) {
        if (t >= a && t <= b) return true;
      }
      return false;
    }

    function updateSystems() {
      systems.forEach((system) => {
        system.corePulse += system.pulseRate;
        system.webProgress = Math.min(system.targetProgress, system.webProgress + system.growthRate);

        system.spokes.forEach((spoke) => {
          const targetReach = spoke.maxReach * system.webProgress;
          if (spoke.liveReach < targetReach) {
            spoke.liveReach = Math.min(targetReach, spoke.liveReach + spoke.growth);
          }

          spoke.wobblePhase += 0.006;
        });

        system.lightningSeeds.forEach((seed) => {
          seed.age += 1;
        });
      });
    }

    function drawSystemGlow(system) {
      const g = ctx.createRadialGradient(system.x, system.y, 0, system.x, system.y, system.maxRadius * 1.05);
      g.addColorStop(0, `rgba(${system.color.glow},0.08)`);
      g.addColorStop(0.12, `rgba(${system.color.glow},0.04)`);
      g.addColorStop(0.34, `rgba(${system.color.glow},0.015)`);
      g.addColorStop(1, `rgba(${system.color.glow},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(system) {
      system.spokes.forEach((spoke) => {
        const steps = 28;
        let started = false;
        let lastPoint = null;

        ctx.beginPath();

        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          if (t > system.webProgress) break;
          if (segmentBlocked(spoke, t)) {
            started = false;
            continue;
          }

          const pt = pointOnSpoke(system, spoke, t);

          if (!started) {
            ctx.moveTo(pt.x, pt.y);
            started = true;
          } else if (lastPoint) {
            const midX = (lastPoint.x + pt.x) * 0.5;
            const midY = (lastPoint.y + pt.y) * 0.5;
            ctx.quadraticCurveTo(lastPoint.x, lastPoint.y, midX, midY);
          }

          lastPoint = pt;
        }

        ctx.strokeStyle = `rgba(${system.color.line},${spoke.alpha})`;
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        if (lastPoint && system.webProgress > 0.2) {
          ctx.beginPath();
          ctx.arc(lastPoint.x, lastPoint.y, Math.max(0.7, spoke.thickness * 0.55), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${system.color.core},${Math.min(0.65, spoke.alpha * 0.7)})`;
          ctx.fill();
        }
      });
    }

    function drawRings(system) {
      const sorted = [...system.spokes].sort((a, b) => a.angle - b.angle);

      system.rings.forEach((ring, ringIndex) => {
        if (ring.ratio > system.webProgress) return;

        const points = [];
        sorted.forEach((spoke, i) => {
          const t = ring.ratio;
          if (segmentBlocked(spoke, t)) return;
          if (spoke.liveReach * t < 14 + ringIndex * 8) return;

          const pt = pointOnSpoke(
            system,
            spoke,
            t,
            Math.sin(frame * 0.01 + i + ringIndex) * ring.jitter + ring.sag * 0.08
          );

          points.push(pt);
        });

        if (points.length < 4) return;

        const visibleCount = Math.max(4, Math.floor(points.length * ring.reveal));

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < visibleCount - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) * 0.5;
          const midY = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }

        const last = points[visibleCount - 1];
        ctx.lineTo(last.x, last.y);

        ctx.strokeStyle = `rgba(${system.color.line},${ring.alpha})`;
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawLightningAccent(system) {
      system.lightningSeeds.forEach((seed) => {
        const spoke = system.spokes[seed.spokeIndex];
        if (!spoke) return;

        const flicker = (Math.sin(seed.age * 0.05) + 1) * 0.5;
        if (flicker < 0.62 || system.webProgress < 0.3) return;

        const steps = 6;
        const startT = rand(0.18, 0.34);
        const endT = Math.min(system.webProgress, startT + seed.lengthRatio);

        if (endT <= startT) return;

        ctx.beginPath();

        let first = true;
        for (let i = 0; i <= steps; i++) {
          const t = startT + ((endT - startT) * i / steps);
          const base = pointOnSpoke(system, spoke, t);
          const jx = rand(-4, 4);
          const jy = rand(-4, 4);

          if (first) {
            ctx.moveTo(base.x + jx, base.y + jy);
            first = false;
          } else {
            ctx.lineTo(base.x + jx, base.y + jy);
          }
        }

        ctx.strokeStyle = `rgba(${system.color.core},${0.18 + flicker * 0.22})`;
        ctx.lineWidth = 0.9 + seed.strength * 0.9;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawCrossLinks() {
      if (systems.length < 2) return;

      const a = systems[0];
      const b = systems[1];
      const aSpokes = a.spokes.slice(3, 8);
      const bSpokes = b.spokes.slice(8, 13);

      for (let i = 0; i < Math.min(aSpokes.length, bSpokes.length); i++) {
        const at = Math.min(a.webProgress * 0.78, 0.78);
        const bt = Math.min(b.webProgress * 0.72, 0.72);

        if (at < 0.28 || bt < 0.28) continue;

        const p1 = pointOnSpoke(a, aSpokes[i], at);
        const p2 = pointOnSpoke(b, bSpokes[i], bt);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        const mx = (p1.x + p2.x) * 0.5 + Math.sin(frame * 0.01 + i) * 12;
        const my = (p1.y + p2.y) * 0.5 - 10;
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = `rgba(255,255,255,0.035)`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }

    function drawCore(system) {
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(
          system.x,
          system.y,
          5 + i * 7 + Math.sin(system.corePulse + i) * 1.1,
          0,
          Math.PI * 2
        );
        ctx.strokeStyle = `rgba(${system.color.line},${0.14 - i * 0.03})`;
        ctx.lineWidth = 1.05 - i * 0.14;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(system.x, system.y, 3.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${system.color.core},0.56)`;
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      systems.forEach(drawSystemGlow);
      systems.forEach(drawRings);
      systems.forEach(drawSpokes);
      systems.forEach(drawLightningAccent);
      drawCrossLinks();
      systems.forEach(drawCore);

      updateSystems();
      frame += 1;

      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
