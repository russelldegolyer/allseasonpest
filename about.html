<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page spider web final version."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 22% 40%, rgba(255,64,64,.030), transparent 22%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,.018), transparent 24%),
        radial-gradient(circle at 56% 54%, rgba(255,175,190,.010), transparent 16%),
        radial-gradient(circle at 30% 78%, rgba(0,0,0,.34), transparent 22%),
        radial-gradient(circle at 72% 28%, rgba(0,0,0,.28), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,.006), rgba(255,255,255,.001)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 22% 40%, rgba(255,66,66,.018), transparent 16%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,.008), transparent 14%),
        radial-gradient(circle at 54% 54%, rgba(255,170,188,.008), transparent 15%);
      mix-blend-mode:screen;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,.08) 70%, rgba(0,0,0,.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.08));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 2px rgba(255,70,70,.05))
        drop-shadow(0 0 3px rgba(255,255,255,.03))
        drop-shadow(0 0 7px rgba(255,180,190,.01));
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let tick = 0;

    let webs = [];
    let crossThreads = [];
    let microThreads = [];
    let overlapWeave = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function dist(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildScene();
    }

    function buildWeb(cx, cy, radius, theme = "red", layer = "mid", custom = {}) {
      const mobile = window.innerWidth < 768;

      const spokeCount =
        custom.spokeCount ??
        (
          layer === "back"
            ? (mobile ? Math.floor(rand(8, 11)) : Math.floor(rand(9, 12)))
            : layer === "front"
            ? (mobile ? Math.floor(rand(9, 12)) : Math.floor(rand(10, 13)))
            : (mobile ? Math.floor(rand(9, 12)) : Math.floor(rand(10, 13)))
        );

      const ringCount =
        custom.ringCount ??
        (
          layer === "back"
            ? (mobile ? Math.floor(rand(7, 9)) : Math.floor(rand(8, 10)))
            : layer === "front"
            ? (mobile ? Math.floor(rand(10, 13)) : Math.floor(rand(11, 14)))
            : (mobile ? Math.floor(rand(9, 12)) : Math.floor(rand(10, 13)))
        );

      const spokes = [];
      let angle = rand(0, Math.PI * 2);

      for (let i = 0; i < spokeCount; i++) {
        angle += (Math.PI * 2 / spokeCount) + rand(-0.18, 0.18);

        const shouldShorten = Math.random() < 0.48;
        const shouldBreakHard = Math.random() < 0.30;

        const baseThickness =
          theme === "red"
            ? layer === "front" ? rand(1.0, 1.9) : layer === "back" ? rand(0.55, 0.95) : rand(0.8, 1.45)
            : layer === "front" ? rand(0.85, 1.55) : layer === "back" ? rand(0.5, 0.85) : rand(0.7, 1.15);

        const baseAlpha =
          theme === "red"
            ? layer === "front" ? rand(0.12, 0.24) : layer === "back" ? rand(0.025, 0.06) : rand(0.07, 0.15)
            : layer === "front" ? rand(0.07, 0.15) : layer === "back" ? rand(0.02, 0.05) : rand(0.05, 0.10);

        spokes.push({
          angle,
          reach: radius * (shouldShorten ? rand(0.42, 0.72) : rand(0.72, 0.94)),
          thickness: baseThickness,
          alpha: baseAlpha,
          curve: rand(-42, 42),
          wobble: layer === "back" ? rand(1.0, 2.8) : rand(1.4, 4.8),
          phase: rand(0, Math.PI * 2),
          breakStart: shouldBreakHard ? rand(0.30, 0.72) : (Math.random() < 0.16 ? rand(0.56, 0.82) : null),
          breakLen: shouldBreakHard ? rand(0.10, 0.24) : rand(0.03, 0.08),
          fadeEarly: Math.random() < 0.42 ? rand(0.40, 0.80) : null
        });
      }

      const rings = [];
      let ratio = 0.14;
      for (let i = 0; i < ringCount; i++) {
        ratio += rand(0.052, 0.085);

        const ringThickness =
          layer === "front" ? rand(0.9, 1.55) :
          layer === "back" ? rand(0.45, 0.8) :
          rand(0.7, 1.2);

        const ringAlpha =
          theme === "red"
            ? layer === "front" ? rand(0.07, 0.14) : layer === "back" ? rand(0.018, 0.04) : rand(0.05, 0.10)
            : layer === "front" ? rand(0.05, 0.11) : layer === "back" ? rand(0.015, 0.035) : rand(0.04, 0.08);

        rings.push({
          ratio,
          thickness: ringThickness,
          alpha: ringAlpha,
          sag: rand(-16, 18),
          jitter: layer === "back" ? rand(0.6, 1.4) : rand(0.8, 2.6),
          partialStart: rand(0.04, 0.36),
          partialEnd: rand(0.60, 0.96),
          dropout: rand(0.08, 0.24)
        });
      }

      return {
        cx,
        cy,
        radius,
        theme,
        layer,
        spokes,
        rings,
        glow: theme === "red" ? "255,72,72" : "255,255,255",
        motion: layer === "back" ? rand(0.0012, 0.0020) : layer === "front" ? rand(0.0024, 0.0032) : rand(0.0018, 0.0027)
      };
    }

    function buildScene() {
      webs = [];
      crossThreads = [];
      microThreads = [];
      overlapWeave = [];

      const mobile = window.innerWidth < 768;

      const redMain = {
        x: w * (mobile ? 0.18 : 0.16),
        y: h * (mobile ? 0.44 : 0.42),
        r: Math.max(w, h) * (mobile ? 0.50 : 0.54)
      };

      const whiteMain = {
        x: w * (mobile ? 0.84 : 0.88),
        y: h * (mobile ? 0.66 : 0.68),
        r: Math.max(w, h) * (mobile ? 0.44 : 0.48)
      };

      const whiteTop = {
        x: w * (mobile ? 0.58 : 0.56),
        y: h * (mobile ? 0.10 : 0.08),
        r: Math.max(w, h) * (mobile ? 0.28 : 0.30)
      };

      webs.push(
        buildWeb(redMain.x, redMain.y, redMain.r * 1.02, "red", "back"),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r * 1.00, "white", "back", { spokeCount: mobile ? 7 : 8 }),

        buildWeb(redMain.x, redMain.y, redMain.r, "red", "mid", { spokeCount: mobile ? 9 : 10 }),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r, "white", "mid", { spokeCount: mobile ? 7 : 8 }),
        buildWeb(whiteTop.x, whiteTop.y, whiteTop.r, "white", "mid", { spokeCount: mobile ? 7 : 8 }),

        buildWeb(redMain.x, redMain.y, redMain.r * 0.96, "red", "front", { spokeCount: mobile ? 9 : 10 }),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r * 0.92, "white", "front", { spokeCount: mobile ? 7 : 8 })
      );

      const mainA = webs[2];
      const mainB = webs[3];

      for (let i = 0; i < 14; i++) {
        crossThreads.push({
          aWeb: mainA,
          bWeb: mainB,
          aSpoke: i % mainA.spokes.length,
          bSpoke: (i * 2 + 3) % mainB.spokes.length,
          ta: rand(0.26, 0.72),
          tb: rand(0.24, 0.68),
          bend: rand(-14, 14),
          alpha: rand(0.018, 0.040),
          width: rand(0.55, 0.9),
          phase: rand(0, Math.PI * 2)
        });
      }

      const microCount = mobile ? 120 : 180;
      for (let i = 0; i < microCount; i++) {
        const wa = webs[Math.floor(rand(0, webs.length))];
        const wb = webs[Math.floor(rand(0, webs.length))];
        microThreads.push({
          wa,
          wb,
          sa: Math.floor(rand(0, wa.spokes.length)),
          sb: Math.floor(rand(0, wb.spokes.length)),
          ta: rand(0.20, 0.90),
          tb: rand(0.20, 0.90),
          bend: rand(-8, 8),
          alpha: rand(0.010, 0.032),
          width: rand(0.28, 0.60),
          phase: rand(0, Math.PI * 2)
        });
      }

      const overlapCount = mobile ? 60 : 90;
      for (let i = 0; i < overlapCount; i++) {
        overlapWeave.push({
          x1: rand(w * 0.32, w * 0.70),
          y1: rand(h * 0.36, h * 0.76),
          x2: rand(w * 0.40, w * 0.80),
          y2: rand(h * 0.40, h * 0.82),
          alpha: rand(0.012, 0.040),
          width: rand(0.35, 0.75),
          bend: rand(-12, 12),
          phase: rand(0, Math.PI * 2)
        });
      }
    }

    function getMixedColor(x, y, alphaBase) {
      const redSource = webs.find(wb => wb.theme === "red" && wb.layer === "mid");
      const whiteSource = webs.find(wb => wb.theme === "white" && wb.layer === "mid");

      const dRed = dist(x, y, redSource.cx, redSource.cy);
      const dWhite = dist(x, y, whiteSource.cx, whiteSource.cy);

      const redInf = clamp(1 - dRed / redSource.radius, 0, 1);
      const whiteInf = clamp(1 - dWhite / whiteSource.radius, 0, 1);

      const total = Math.max(0.0001, redInf + whiteInf);
      const mix = whiteInf / total;

      const r = 255;
      const g = lerp(82, 255, mix);
      const b = lerp(82, 255, mix);
      const a = alphaBase * (0.74 + Math.max(redInf, whiteInf) * 0.32);

      return `rgba(${r.toFixed(0)},${g.toFixed(0)},${b.toFixed(0)},${a})`;
    }

    function pointOnSpoke(web, spoke, p, extraSag = 0) {
      const baseR = spoke.reach * p;
      const normalX = Math.cos(spoke.angle + Math.PI / 2);
      const normalY = Math.sin(spoke.angle + Math.PI / 2);

      const wiggle =
        Math.sin(tick * web.motion + spoke.phase + p * 2.8) *
        spoke.wobble *
        (0.18 + p * 0.18);

      const curve = Math.sin((p * Math.PI * 0.9) + spoke.phase * 0.32) * spoke.curve * (0.28 + p * 0.42);

      return {
        x: web.cx + Math.cos(spoke.angle) * baseR + normalX * (wiggle + curve * 0.34),
        y: web.cy + Math.sin(spoke.angle) * baseR + normalY * (wiggle + extraSag + curve * 0.34)
      };
    }

    function isBroken(spoke, p) {
      if (spoke.breakStart === null) return false;
      return p >= spoke.breakStart && p <= (spoke.breakStart + spoke.breakLen);
    }

    function drawGlow(web) {
      const g = ctx.createRadialGradient(web.cx, web.cy, 0, web.cx, web.cy, web.radius * 1.02);
      const baseA =
        web.theme === "red"
          ? (web.layer === "front" ? 0.020 : web.layer === "mid" ? 0.012 : 0.006)
          : (web.layer === "front" ? 0.010 : web.layer === "mid" ? 0.007 : 0.004);

      g.addColorStop(0, `rgba(${web.glow},${baseA})`);
      g.addColorStop(0.24, `rgba(${web.glow},${baseA * 0.38})`);
      g.addColorStop(0.50, `rgba(${web.glow},${baseA * 0.10})`);
      g.addColorStop(1, `rgba(${web.glow},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(web) {
      web.spokes.forEach((spoke) => {
        const steps = 30;
        let started = false;
        let prev = null;

        ctx.beginPath();

        for (let i = 0; i <= steps; i++) {
          const p = i / steps;

          if (spoke.fadeEarly !== null && p > spoke.fadeEarly) break;

          if (isBroken(spoke, p)) {
            started = false;
            prev = null;
            continue;
          }

          const pt = pointOnSpoke(web, spoke, p);

          if (!started) {
            ctx.moveTo(pt.x, pt.y);
            started = true;
          } else if (prev) {
            const mx = (prev.x + pt.x) * 0.5;
            const my = (prev.y + pt.y) * 0.5;
            ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
          }

          prev = pt;
        }

        const sample = pointOnSpoke(web, spoke, 0.48);
        ctx.strokeStyle = getMixedColor(sample.x, sample.y, spoke.alpha);
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawRings(web) {
      const sorted = [...web.spokes].sort((a, b) => a.angle - b.angle);

      web.rings.forEach((ring, ringIndex) => {
        const points = [];

        sorted.forEach((spoke, i) => {
          const p = ring.ratio;
          if (p < ring.partialStart || p > ring.partialEnd) return;
          if (Math.random() < ring.dropout * 0.10) return;
          if (isBroken(spoke, p)) return;

          const pt = pointOnSpoke(
            web,
            spoke,
            p,
            Math.sin(tick * web.motion + i + ringIndex) * ring.jitter + ring.sag * 0.08
          );

          points.push(pt);
        });

        if (points.length < 4) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

        const cp = points[Math.floor(points.length / 2)];
        ctx.strokeStyle = getMixedColor(cp.x, cp.y, ring.alpha);
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawCrossThreads() {
      crossThreads.forEach((thread) => {
        const spokeA = thread.aWeb.spokes[thread.aSpoke];
        const spokeB = thread.bWeb.spokes[thread.bSpoke];

        if (isBroken(spokeA, thread.ta) || isBroken(spokeB, thread.tb)) return;

        const p1 = pointOnSpoke(thread.aWeb, spokeA, thread.ta);
        const p2 = pointOnSpoke(thread.bWeb, spokeB, thread.tb);

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(tick * 0.0024 + thread.phase) * thread.bend;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(tick * 0.0024 + thread.phase) * (thread.bend * 0.65);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawMicroThreads() {
      microThreads.forEach((thread) => {
        const spokeA = thread.wa.spokes[thread.sa];
        const spokeB = thread.wb.spokes[thread.sb];
        if (!spokeA || !spokeB) return;
        if (isBroken(spokeA, thread.ta) || isBroken(spokeB, thread.tb)) return;

        const p1 = pointOnSpoke(thread.wa, spokeA, thread.ta);
        const p2 = pointOnSpoke(thread.wb, spokeB, thread.tb);

        if (dist(p1.x, p1.y, p2.x, p2.y) > Math.min(w, h) * 0.26) return;

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(tick * 0.0019 + thread.phase) * thread.bend;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(tick * 0.0019 + thread.phase) * (thread.bend * 0.65);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawOverlapWeave() {
      overlapWeave.forEach((thread) => {
        const x1 = thread.x1 + Math.sin(tick * 0.0018 + thread.phase) * 5;
        const y1 = thread.y1 + Math.cos(tick * 0.0017 + thread.phase) * 4;
        const x2 = thread.x2 + Math.cos(tick * 0.0016 + thread.phase) * 5;
        const y2 = thread.y2 + Math.sin(tick * 0.0019 + thread.phase) * 4;

        const mx = (x1 + x2) * 0.5 + Math.sin(tick * 0.0018 + thread.phase) * thread.bend;
        const my = (y1 + y2) * 0.5 + Math.cos(tick * 0.0017 + thread.phase) * (thread.bend * 0.7);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(mx, my, x2, y2);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawCoreDim(web) {
      const coreAlpha = web.theme === "red" ? 0.10 : 0.07;
      const coreRadius = web.layer === "front" ? 1.6 : 1.2;

      ctx.beginPath();
      ctx.arc(web.cx, web.cy, coreRadius, 0, Math.PI * 2);
      ctx.fillStyle = getMixedColor(web.cx, web.cy, coreAlpha);
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      webs.forEach(drawGlow);

      webs.filter(wb => wb.layer === "back").forEach(drawRings);
      webs.filter(wb => wb.layer === "back").forEach(drawSpokes);

      drawMicroThreads();

      webs.filter(wb => wb.layer === "mid").forEach(drawRings);
      webs.filter(wb => wb.layer === "mid").forEach(drawSpokes);

      drawCrossThreads();
      drawOverlapWeave();

      webs.filter(wb => wb.layer === "front").forEach(drawRings);
      webs.filter(wb => wb.layer === "front").forEach(drawSpokes);

      webs.filter(wb => wb.layer !== "back").forEach(drawCoreDim);

      tick += 1;
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
