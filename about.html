<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page spider web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --purple:#8b5cf6;
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 18% 22%, rgba(139,92,246,.12), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(139,92,246,.07), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,.003)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.10)),
        radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,.08) 100%);
    }

    .web-layer{
      position:absolute;
      inset:-10%;
      width:120%;
      height:120%;
      pointer-events:none;
      z-index:1;
      opacity:.95;
      filter:
        drop-shadow(0 0 10px rgba(139,92,246,.28))
        drop-shadow(0 0 24px rgba(139,92,246,.12));
      animation:webDrift 20s linear infinite;
      transform-origin:center;
    }

    .web-layer.back{
      opacity:.34;
      transform:scale(1.18) rotate(-8deg);
      animation-duration:28s;
      filter:
        drop-shadow(0 0 14px rgba(139,92,246,.18))
        drop-shadow(0 0 30px rgba(139,92,246,.08));
    }

    .web-layer.front{
      transform:scale(1.02) rotate(4deg);
    }

    @keyframes webDrift{
      from{
        translate:-42px 30px;
      }
      to{
        translate:42px -30px;
      }
    }

    .web-svg{
      width:100%;
      height:100%;
      display:block;
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    .strand{
      fill:none;
      stroke:rgba(167,123,255,.78);
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .strand.thin{
      stroke-width:1.2;
      opacity:.7;
    }

    .strand.mid{
      stroke-width:1.8;
      opacity:.82;
    }

    .strand.bold{
      stroke-width:2.4;
      opacity:.95;
    }

    .strand.faint{
      stroke-width:1;
      opacity:.34;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .web-layer{
        inset:-18%;
        width:136%;
        height:136%;
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>

</body>
</html>
