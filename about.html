<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page web field experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 24% 38%, rgba(255,46,46,.03), transparent 28%),
        radial-gradient(circle at 78% 66%, rgba(255,255,255,.02), transparent 30%),
        radial-gradient(circle at 50% 52%, rgba(255,120,140,.012), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
      touch-action:none;
    }

    .about-stage::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 28% 40%, rgba(255,60,60,.035), transparent 18%),
        radial-gradient(circle at 74% 64%, rgba(255,255,255,.02), transparent 16%),
        radial-gradient(circle at 52% 52%, rgba(255,170,180,.018), transparent 20%);
      mix-blend-mode:screen;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,.10) 70%, rgba(0,0,0,.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.10));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 5px rgba(255,70,70,.09))
        drop-shadow(0 0 7px rgba(255,255,255,.05))
        drop-shadow(0 0 16px rgba(255,160,170,.02));
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let t = 0;

    let anchors = [];
    let rings = [];
    let bridges = [];
    let fineThreads = [];

    let redField = { x: 0, y: 0, r: 0 };
    let draggingRed = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function lerp(a, b, p) {
      return a + (b - a) * p;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function dist(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildScene();
    }

    function redInfluence(x, y) {
      const d = dist(x, y, redField.x, redField.y);
      const norm = clamp(1 - d / redField.r, 0, 1);
      return norm * norm;
    }

    function mixColorAt(x, y, baseAlpha, brighten = 1) {
      const rInf = redInfluence(x, y);
      const whiteWeight = 1 - rInf;

      const rr = lerp(255, 255, whiteWeight);
      const gg = lerp(74, 255, whiteWeight);
      const bb = lerp(74, 255, whiteWeight);

      const a = baseAlpha * brighten;
      return `rgba(${rr.toFixed(0)},${gg.toFixed(0)},${bb.toFixed(0)},${a})`;
    }

    function buildScene() {
      anchors = [];
      rings = [];
      bridges = [];
      fineThreads = [];

      const mobile = window.innerWidth < 768;

      redField = {
        x: w * (mobile ? 0.34 : 0.32),
        y: h * (mobile ? 0.43 : 0.44),
        r: Math.max(w, h) * (mobile ? 0.55 : 0.52)
      };

      const cols = mobile ? 5 : 7;
      const rows = mobile ? 6 : 7;
      const xGap = w / (cols - 1);
      const yGap = h / (rows - 1);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const baseX = x * xGap;
          const baseY = y * yGap;

          anchors.push({
            x: baseX + rand(-xGap * 0.22, xGap * 0.22),
            y: baseY + rand(-yGap * 0.22, yGap * 0.22),
            driftX: rand(-8, 8),
            driftY: rand(-8, 8),
            phase: rand(0, Math.PI * 2),
            pull: rand(-18, 18)
          });
        }
      }

      const ringCount = mobile ? 28 : 40;
      for (let i = 0; i < ringCount; i++) {
        const cx = rand(-w * 0.08, w * 1.08);
        const cy = rand(-h * 0.08, h * 1.08);
        const radius = rand(Math.min(w, h) * 0.08, Math.min(w, h) * 0.28);

        rings.push({
          cx,
          cy,
          radius,
          squash: rand(0.62, 1.18),
          rotate: rand(0, Math.PI * 2),
          alpha: rand(0.03, 0.14),
          width: rand(0.9, 2.3),
          wobble: rand(3, 14),
          phase: rand(0, Math.PI * 2),
          segments: Math.floor(rand(24, 44)),
          gapChance: rand(0.02, 0.15)
        });
      }

      for (let i = 0; i < anchors.length; i++) {
        for (let j = i + 1; j < anchors.length; j++) {
          const a = anchors[i];
          const b = anchors[j];
          const d = dist(a.x, a.y, b.x, b.y);

          if (d < Math.min(w, h) * 0.35 && Math.random() < 0.26) {
            bridges.push({
              a: i,
              b: j,
              alpha: rand(0.025, 0.14),
              width: rand(0.8, 2.0),
              curve: rand(-34, 34),
              phase: rand(0, Math.PI * 2)
            });
          }
        }
      }

      const fineCount = mobile ? 44 : 68;
      for (let i = 0; i < fineCount; i++) {
        fineThreads.push({
          a: Math.floor(rand(0, anchors.length)),
          b: Math.floor(rand(0, anchors.length)),
          cBias: rand(-26, 26),
          alpha: rand(0.02, 0.06),
          width: rand(0.55, 1.0),
          phase: rand(0, Math.PI * 2)
        });
      }
    }

    function getAnchorPoint(anchor, index) {
      return {
        x: anchor.x + Math.sin(t * 0.003 + anchor.phase + index * 0.1) * anchor.driftX,
        y: anchor.y + Math.cos(t * 0.003 + anchor.phase + index * 0.08) * anchor.driftY
      };
    }

    function drawGlowField() {
      const g1 = ctx.createRadialGradient(redField.x, redField.y, 0, redField.x, redField.y, redField.r);
      g1.addColorStop(0, "rgba(255,72,72,0.07)");
      g1.addColorStop(0.25, "rgba(255,72,72,0.028)");
      g1.addColorStop(1, "rgba(255,72,72,0)");
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, w, h);

      const g2 = ctx.createRadialGradient(w * 0.78, h * 0.65, 0, w * 0.78, h * 0.65, Math.max(w, h) * 0.36);
      g2.addColorStop(0, "rgba(255,255,255,0.035)");
      g2.addColorStop(0.24, "rgba(255,255,255,0.015)");
      g2.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, w, h);
    }

    function drawRings() {
      rings.forEach((ring, index) => {
        ctx.beginPath();

        let started = false;
        for (let i = 0; i <= ring.segments; i++) {
          const p = i / ring.segments;
          const ang = p * Math.PI * 2 + ring.rotate;
          if (Math.random() < ring.gapChance * 0.08 && i !== 0 && i !== ring.segments) {
            started = false;
            continue;
          }

          const wob = Math.sin(t * 0.004 + ring.phase + i * 0.4) * ring.wobble;
          const rx = Math.cos(ang) * (ring.radius + wob);
          const ry = Math.sin(ang) * ((ring.radius * ring.squash) + wob * 0.55);

          const x = ring.cx + rx;
          const y = ring.cy + ry;

          if (!started) {
            ctx.moveTo(x, y);
            started = true;
          } else {
            ctx.lineTo(x, y);
          }
        }

        ctx.strokeStyle = mixColorAt(ring.cx, ring.cy, ring.alpha, 1);
        ctx.lineWidth = ring.width;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.stroke();
      });
    }

    function drawBridges() {
      bridges.forEach((bridge, index) => {
        const a0 = getAnchorPoint(anchors[bridge.a], bridge.a);
        const b0 = getAnchorPoint(anchors[bridge.b], bridge.b);

        const mx = (a0.x + b0.x) * 0.5 + Math.sin(t * 0.004 + bridge.phase) * bridge.curve;
        const my = (a0.y + b0.y) * 0.5 + Math.cos(t * 0.004 + bridge.phase) * (bridge.curve * 0.6);

        const midInf = redInfluence(mx, my);
        const alphaBoost = 1 + midInf * 0.45;

        ctx.beginPath();
        ctx.moveTo(a0.x, a0.y);
        ctx.quadraticCurveTo(mx, my, b0.x, b0.y);
        ctx.strokeStyle = mixColorAt(mx, my, bridge.alpha, alphaBoost);
        ctx.lineWidth = bridge.width;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawFineThreads() {
      fineThreads.forEach((thread, idx) => {
        const a = anchors[thread.a];
        const b = anchors[thread.b];
        if (!a || !b || thread.a === thread.b) return;

        const p1 = getAnchorPoint(a, thread.a);
        const p2 = getAnchorPoint(b, thread.b);

        if (dist(p1.x, p1.y, p2.x, p2.y) > Math.min(w, h) * 0.52) return;

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(t * 0.003 + thread.phase) * thread.cBias;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(t * 0.003 + thread.phase) * (thread.cBias * 0.55);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = mixColorAt(mx, my, thread.alpha, 1);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawKnotNoise() {
      const knots = [
        { x: redField.x, y: redField.y, r: redField.r * 0.12 },
        { x: w * 0.77, y: h * 0.64, r: Math.max(w, h) * 0.08 },
        { x: (redField.x + w * 0.77) * 0.5, y: (redField.y + h * 0.64) * 0.5, r: Math.max(w, h) * 0.06 }
      ];

      knots.forEach((knot, idx) => {
        for (let i = 0; i < 12; i++) {
          const a1 = (Math.PI * 2 * i / 12) + Math.sin(t * 0.003 + i + idx) * 0.3;
          const a2 = a1 + rand(0.4, 1.2);
          const r1 = knot.r * rand(0.2, 0.95);
          const r2 = knot.r * rand(0.2, 0.95);

          const x1 = knot.x + Math.cos(a1) * r1;
          const y1 = knot.y + Math.sin(a1) * r1;
          const x2 = knot.x + Math.cos(a2) * r2;
          const y2 = knot.y + Math.sin(a2) * r2;

          const mx = (x1 + x2) * 0.5 + rand(-8, 8);
          const my = (y1 + y2) * 0.5 + rand(-8, 8);

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(mx, my, x2, y2);
          ctx.strokeStyle = mixColorAt(mx, my, idx === 0 ? 0.06 : 0.035, 1);
          ctx.lineWidth = idx === 0 ? 1.15 : 0.8;
          ctx.stroke();
        }
      });
    }

    function drawTravelFlickers() {
      for (let i = 0; i < 8; i++) {
        const bridge = bridges[(Math.floor(t * 0.03) + i * 7) % bridges.length];
        if (!bridge) continue;

        const a0 = getAnchorPoint(anchors[bridge.a], bridge.a);
        const b0 = getAnchorPoint(anchors[bridge.b], bridge.b);
        const p = (Math.sin(t * 0.02 + i) + 1) * 0.5;

        const cx = (a0.x + b0.x) * 0.5 + Math.sin(t * 0.004 + bridge.phase) * bridge.curve;
        const cy = (a0.y + b0.y) * 0.5 + Math.cos(t * 0.004 + bridge.phase) * (bridge.curve * 0.6);

        const qx1 = lerp(a0.x, cx, p);
        const qy1 = lerp(a0.y, cy, p);
        const qx2 = lerp(cx, b0.x, p);
        const qy2 = lerp(cy, b0.y, p);

        const x = lerp(qx1, qx2, p);
        const y = lerp(qy1, qy2, p);

        ctx.beginPath();
        ctx.arc(x, y, 1.2 + (i % 3) * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = mixColorAt(x, y, 0.09, 1.4);
        ctx.fill();
      }
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      drawGlowField();
      drawRings();
      drawFineThreads();
      drawBridges();
      drawKnotNoise();
      drawTravelFlickers();

      t += 1;
      requestAnimationFrame(render);
    }

    function getPointerPosition(event) {
      const rect = stage.getBoundingClientRect();
      let clientX;
      let clientY;

      if (event.touches && event.touches.length) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDrag(event) {
      const pos = getPointerPosition(event);
      const hitRadius = Math.max(70, redField.r * 0.18);

      if (dist(pos.x, pos.y, redField.x, redField.y) <= hitRadius) {
        draggingRed = true;
        dragOffsetX = pos.x - redField.x;
        dragOffsetY = pos.y - redField.y;
        event.preventDefault();
      }
    }

    function moveDrag(event) {
      if (!draggingRed) return;

      const pos = getPointerPosition(event);
      redField.x = clamp(pos.x - dragOffsetX, -w * 0.08, w * 1.08);
      redField.y = clamp(pos.y - dragOffsetY, -h * 0.08, h * 1.08);
      event.preventDefault();
    }

    function endDrag() {
      draggingRed = false;
    }

    stage.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", moveDrag);
    window.addEventListener("mouseup", endDrag);

    stage.addEventListener("touchstart", startDrag, { passive: false });
    window.addEventListener("touchmove", moveDrag, { passive: false });
    window.addEventListener("touchend", endDrag);

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
