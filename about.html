<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page red lightning web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 38% 42%, rgba(255,30,30,.08), transparent 16%),
        radial-gradient(circle at 72% 58%, rgba(255,20,20,.06), transparent 18%),
        radial-gradient(circle at 18% 22%, rgba(255,20,20,.025), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(255,20,20,.02), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 38% 42%, rgba(0,0,0,.02) 0%, rgba(0,0,0,.18) 68%, rgba(0,0,0,.3) 100%),
        linear-gradient(180deg, rgba(0,0,0,.1), rgba(0,0,0,.12));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 4px rgba(255,60,60,.4))
        drop-shadow(0 0 12px rgba(255,20,20,.2))
        drop-shadow(0 0 28px rgba(255,0,0,.12));
    }

    .center-glow{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 38% 42%, rgba(255,40,40,.12) 0%, rgba(255,20,20,.05) 8%, transparent 22%),
        radial-gradient(circle at 72% 58%, rgba(255,40,40,.08) 0%, rgba(255,20,20,.03) 7%, transparent 19%);
      mix-blend-mode:screen;
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>
      <div class="center-glow"></div>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let time = 0;
    let bolts = [];
    let nodes = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      initSystem();
    }

    function createNodeSet() {
      const mobile = window.innerWidth < 768;

      return [
        {
          x: w * (mobile ? 0.42 : 0.38),
          y: h * (mobile ? 0.43 : 0.42),
          radius: Math.max(w, h) * (mobile ? 0.42 : 0.36),
          strength: 1.0
        },
        {
          x: w * (mobile ? 0.68 : 0.72),
          y: h * (mobile ? 0.60 : 0.58),
          radius: Math.max(w, h) * (mobile ? 0.34 : 0.28),
          strength: 0.72
        }
      ];
    }

    function createBolt(origin, strength = 1, isBranch = false) {
      const angle = rand(0, Math.PI * 2);
      const len = origin.radius * rand(isBranch ? 0.12 : 0.22, isBranch ? 0.28 : 0.50) * strength;
      const segments = Math.floor(rand(isBranch ? 5 : 8, isBranch ? 10 : 15));

      const pts = [];
      let x = origin.x;
      let y = origin.y;
      pts.push({ x, y });

      let currentAngle = angle;
      const step = len / segments;

      for (let i = 0; i < segments; i++) {
        currentAngle += rand(-0.38, 0.38);
        const pullX = (origin.x - x) * rand(-0.004, 0.001);
        const pullY = (origin.y - y) * rand(-0.004, 0.001);

        x += Math.cos(currentAngle) * step + rand(-10, 10) + pullX;
        y += Math.sin(currentAngle) * step + rand(-10, 10) + pullY;

        pts.push({ x, y });
      }

      return {
        origin,
        points: pts,
        age: 0,
        life: rand(isBranch ? 10 : 14, isBranch ? 18 : 28),
        alpha: rand(isBranch ? 0.28 : 0.55, isBranch ? 0.58 : 0.95) * strength,
        width: rand(isBranch ? 0.7 : 1.2, isBranch ? 1.4 : 2.4) * strength,
        branchChance: isBranch ? 0 : rand(0.18, 0.42),
        isBranch,
        progress: 0,
        growSpeed: rand(isBranch ? 0.14 : 0.18, isBranch ? 0.28 : 0.34),
        jitter: rand(0.4, 1.2),
        colorShift: rand(0, 1)
      };
    }

    function initSystem() {
      nodes = createNodeSet();
      bolts = [];

      for (let i = 0; i < 28; i++) {
        const node = nodes[i % nodes.length];
        bolts.push(createBolt(node, node.strength));
      }
    }

    function spawnBolts() {
      const mobile = window.innerWidth < 768;
      const target = mobile ? 34 : 48;

      while (bolts.length < target) {
        const node = Math.random() < 0.65 ? nodes[0] : nodes[1];
        bolts.push(createBolt(node, node.strength));

        if (Math.random() < 0.45) {
          bolts.push(createBolt(node, node.strength * rand(0.45, 0.8), true));
        }
      }
    }

    function updateBolts() {
      const newBranches = [];

      for (const bolt of bolts) {
        bolt.age += 1;
        bolt.progress = Math.min(1, bolt.progress + bolt.growSpeed);

        if (!bolt.isBranch && bolt.age < bolt.life * 0.45 && Math.random() < bolt.branchChance * 0.08) {
          const idx = Math.floor(rand(1, Math.max(2, bolt.points.length - 2)));
          const p = bolt.points[idx];
          const tempNode = {
            x: p.x,
            y: p.y,
            radius: bolt.origin.radius * 0.42
          };
          newBranches.push(createBolt(tempNode, rand(0.45, 0.8), true));
        }
      }

      bolts.push(...newBranches);
      bolts = bolts.filter((b) => b.age < b.life);
    }

    function drawBackgroundGlow() {
      for (const node of nodes) {
        const g = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, node.radius * 0.95);
        g.addColorStop(0, `rgba(255,30,30,${0.09 * node.strength})`);
        g.addColorStop(0.18, `rgba(255,10,10,${0.045 * node.strength})`);
        g.addColorStop(0.45, `rgba(180,0,0,${0.016 * node.strength})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }
    }

    function drawBolt(bolt) {
      const visibleCount = Math.max(2, Math.floor((bolt.points.length - 1) * bolt.progress) + 1);
      const pts = bolt.points.slice(0, visibleCount);

      if (pts.length < 2) return;

      const fade = 1 - (bolt.age / bolt.life);
      const alpha = bolt.alpha * fade;

      const coreColor = bolt.colorShift > 0.5
        ? `rgba(255,120,120,${alpha})`
        : `rgba(255,90,90,${alpha})`;

      const outerColor = bolt.colorShift > 0.5
        ? `rgba(255,30,30,${alpha * 0.42})`
        : `rgba(220,0,0,${alpha * 0.42})`;

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);

      for (let i = 1; i < pts.length; i++) {
        const p = pts[i];
        const offsetX = Math.sin(time * 0.08 + i + bolt.age) * bolt.jitter;
        const offsetY = Math.cos(time * 0.08 + i * 1.3 + bolt.age) * bolt.jitter;
        ctx.lineTo(p.x + offsetX, p.y + offsetY);
      }

      ctx.strokeStyle = outerColor;
      ctx.lineWidth = bolt.width * 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);

      for (let i = 1; i < pts.length; i++) {
        const p = pts[i];
        const offsetX = Math.sin(time * 0.08 + i + bolt.age) * bolt.jitter;
        const offsetY = Math.cos(time * 0.08 + i * 1.3 + bolt.age) * bolt.jitter;
        ctx.lineTo(p.x + offsetX, p.y + offsetY);
      }

      ctx.strokeStyle = coreColor;
      ctx.lineWidth = bolt.width;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();

      const end = pts[pts.length - 1];
      ctx.beginPath();
      ctx.arc(end.x, end.y, Math.max(0.8, bolt.width * 0.9), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,180,180,${alpha * 0.8})`;
      ctx.fill();
    }

    function drawConnections() {
      const activeEnds = [];

      for (const bolt of bolts) {
        const visibleCount = Math.max(2, Math.floor((bolt.points.length - 1) * bolt.progress) + 1);
        const pts = bolt.points.slice(0, visibleCount);
        if (pts.length > 1) {
          activeEnds.push({
            point: pts[pts.length - 1],
            alpha: bolt.alpha * (1 - bolt.age / bolt.life),
            branch: bolt.isBranch
          });
        }
      }

      for (let i = 0; i < activeEnds.length; i++) {
        for (let j = i + 1; j < activeEnds.length; j++) {
          const a = activeEnds[i];
          const b = activeEnds[j];
          const dist = distance(a.point, b.point);

          if (dist < 120 && Math.random() < 0.12) {
            const alpha = Math.min(a.alpha, b.alpha) * (1 - dist / 120) * 0.55;

            ctx.beginPath();
            ctx.moveTo(a.point.x, a.point.y);

            const midX = (a.point.x + b.point.x) * 0.5 + rand(-12, 12);
            const midY = (a.point.y + b.point.y) * 0.5 + rand(-12, 12);

            ctx.quadraticCurveTo(midX, midY, b.point.x, b.point.y);
            ctx.strokeStyle = `rgba(255,55,55,${alpha})`;
            ctx.lineWidth = a.branch || b.branch ? 0.8 : 1.15;
            ctx.stroke();
          }
        }
      }
    }

    function drawNodeCore() {
      for (const node of nodes) {
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(
            node.x,
            node.y,
            5 + i * 8 + Math.sin(time * 0.05 + i) * 1.4,
            0,
            Math.PI * 2
          );
          ctx.strokeStyle = `rgba(255,50,50,${0.17 - i * 0.04})`;
          ctx.lineWidth = 1.2 - i * 0.18;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(node.x, node.y, 3.8, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,190,190,0.66)";
        ctx.fill();
      }
    }

    function drawRedDust() {
      for (const node of nodes) {
        for (let i = 0; i < 10; i++) {
          const angle = time * 0.01 + i * (Math.PI * 2 / 10);
          const radius = 12 + i * 5 + Math.sin(time * 0.03 + i) * 2.2;
          const x = node.x + Math.cos(angle) * radius;
          const y = node.y + Math.sin(angle) * radius;

          ctx.beginPath();
          ctx.arc(x, y, 0.9 + (i % 3) * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255,110,110,0.13)";
          ctx.fill();
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      drawBackgroundGlow();
      drawConnections();

      bolts.sort((a, b) => a.width - b.width);
      for (const bolt of bolts) {
        drawBolt(bolt);
      }

      drawNodeCore();
      drawRedDust();

      updateBolts();
      spawnBolts();
      time += 1;

      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
