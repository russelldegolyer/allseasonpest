<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page spider web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 24% 40%, rgba(255,64,64,.05), transparent 24%),
        radial-gradient(circle at 78% 68%, rgba(255,255,255,.035), transparent 26%),
        radial-gradient(circle at 54% 54%, rgba(255,160,170,.02), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 24% 40%, rgba(255,60,60,.035), transparent 18%),
        radial-gradient(circle at 78% 68%, rgba(255,255,255,.02), transparent 16%),
        radial-gradient(circle at 54% 54%, rgba(255,170,185,.015), transparent 16%);
      mix-blend-mode:screen;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,.08) 68%, rgba(0,0,0,.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.10));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 5px rgba(255,70,70,.10))
        drop-shadow(0 0 7px rgba(255,255,255,.05))
        drop-shadow(0 0 14px rgba(255,180,190,.02));
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let tick = 0;
    let webs = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildWebs();
    }

    function buildWeb(cx, cy, radius, theme = "red") {
      const mobile = window.innerWidth < 768;
      const spokeCount = mobile ? Math.floor(rand(11, 15)) : Math.floor(rand(13, 18));
      const ringCount = mobile ? Math.floor(rand(9, 13)) : Math.floor(rand(11, 15));

      const spokes = [];
      let angle = rand(0, Math.PI * 2);

      for (let i = 0; i < spokeCount; i++) {
        angle += (Math.PI * 2 / spokeCount) + rand(-0.11, 0.11);

        spokes.push({
          angle,
          reach: radius * rand(0.84, 1.10),
          thickness: theme === "red" ? rand(1.1, 2.4) : rand(1.0, 2.0),
          alpha: theme === "red" ? rand(0.18, 0.46) : rand(0.10, 0.28),
          curve: rand(-18, 18),
          wobble: rand(2, 8),
          phase: rand(0, Math.PI * 2),
          breakStart: Math.random() < 0.25 ? rand(0.58, 0.86) : null,
          breakLen: rand(0.02, 0.06)
        });
      }

      const rings = [];
      let ratio = 0.12;
      for (let i = 0; i < ringCount; i++) {
        ratio += rand(0.055, 0.078);
        rings.push({
          ratio,
          thickness: theme === "red" ? rand(1.1, 2.1) : rand(1.0, 1.8),
          alpha: theme === "red" ? rand(0.10, 0.22) : rand(0.08, 0.17),
          sag: rand(-8, 10),
          jitter: rand(1.2, 4.0),
          partialStart: rand(0, 0.18),
          partialEnd: rand(0.82, 1),
        });
      }

      return {
        cx,
        cy,
        radius,
        theme,
        spokes,
        rings,
        glow: theme === "red" ? "255,72,72" : "255,255,255",
        line: theme === "red" ? "255,82,82" : "255,255,255",
        pulse: rand(0, Math.PI * 2)
      };
    }

    function buildWebs() {
      const mobile = window.innerWidth < 768;

      webs = [
        buildWeb(
          w * (mobile ? 0.18 : 0.16),
          h * (mobile ? 0.44 : 0.42),
          Math.max(w, h) * (mobile ? 0.50 : 0.54),
          "red"
        ),
        buildWeb(
          w * (mobile ? 0.84 : 0.88),
          h * (mobile ? 0.66 : 0.68),
          Math.max(w, h) * (mobile ? 0.44 : 0.48),
          "white"
        ),
        buildWeb(
          w * (mobile ? 0.58 : 0.56),
          h * (mobile ? 0.10 : 0.08),
          Math.max(w, h) * (mobile ? 0.28 : 0.30),
          "white"
        )
      ];
    }

    function getMixedColor(x, y, alphaBase) {
      const redWeb = webs[0];
      const whiteWeb = webs[1];

      const dRed = Math.hypot(x - redWeb.cx, y - redWeb.cy);
      const dWhite = Math.hypot(x - whiteWeb.cx, y - whiteWeb.cy);

      const redInf = clamp(1 - dRed / redWeb.radius, 0, 1);
      const whiteInf = clamp(1 - dWhite / whiteWeb.radius, 0, 1);

      const total = Math.max(0.0001, redInf + whiteInf);
      const mix = whiteInf / total;

      const r = 255;
      const g = lerp(82, 255, mix);
      const b = lerp(82, 255, mix);
      const a = alphaBase * (0.75 + Math.max(redInf, whiteInf) * 0.45);

      return `rgba(${r.toFixed(0)},${g.toFixed(0)},${b.toFixed(0)},${a})`;
    }

    function pointOnSpoke(web, spoke, t, extraSag = 0) {
      const baseR = spoke.reach * t;
      const nx = Math.cos(spoke.angle + Math.PI / 2);
      const ny = Math.sin(spoke.angle + Math.PI / 2);

      const wiggle =
        Math.sin(tick * 0.004 + spoke.phase + t * 4) *
        spoke.wobble *
        (0.15 + t * 0.25);

      const curve = Math.sin((t * Math.PI) + spoke.phase * 0.35) * spoke.curve * t;

      return {
        x: web.cx + Math.cos(spoke.angle) * baseR + nx * (wiggle + curve * 0.25),
        y: web.cy + Math.sin(spoke.angle) * baseR + ny * (wiggle + extraSag + curve * 0.25)
      };
    }

    function isBroken(spoke, t) {
      if (spoke.breakStart === null) return false;
      return t >= spoke.breakStart && t <= (spoke.breakStart + spoke.breakLen);
    }

    function drawGlow(web) {
      const g = ctx.createRadialGradient(web.cx, web.cy, 0, web.cx, web.cy, web.radius * 1.05);
      const baseA = web.theme === "red" ? 0.06 : 0.03;
      g.addColorStop(0, `rgba(${web.glow},${baseA})`);
      g.addColorStop(0.18, `rgba(${web.glow},${baseA * 0.4})`);
      g.addColorStop(0.4, `rgba(${web.glow},${baseA * 0.12})`);
      g.addColorStop(1, `rgba(${web.glow},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(web) {
      web.spokes.forEach((spoke) => {
        const steps = 26;
        let started = false;
        let prev = null;

        ctx.beginPath();

        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          if (isBroken(spoke, t)) {
            started = false;
            prev = null;
            continue;
          }

          const pt = pointOnSpoke(web, spoke, t);

          if (!started) {
            ctx.moveTo(pt.x, pt.y);
            started = true;
          } else if (prev) {
            const mx = (prev.x + pt.x) * 0.5;
            const my = (prev.y + pt.y) * 0.5;
            ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
          }

          prev = pt;
        }

        const sample = pointOnSpoke(web, spoke, 0.55);
        ctx.strokeStyle = getMixedColor(sample.x, sample.y, spoke.alpha);
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawRings(web) {
      const sorted = [...web.spokes].sort((a, b) => a.angle - b.angle);

      web.rings.forEach((ring, ringIndex) => {
        const points = [];

        sorted.forEach((spoke, i) => {
          const t = ring.ratio;
          if (t < ring.partialStart || t > ring.partialEnd) return;
          if (isBroken(spoke, t)) return;

          const pt = pointOnSpoke(
            web,
            spoke,
            t,
            Math.sin(tick * 0.004 + i + ringIndex) * ring.jitter + ring.sag * 0.06
          );

          points.push(pt);
        });

        if (points.length < 4) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }

        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

        const centerPoint = points[Math.floor(points.length / 2)];
        ctx.strokeStyle = getMixedColor(centerPoint.x, centerPoint.y, ring.alpha);
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawCrossStitches() {
      const webA = webs[0];
      const webB = webs[1];

      const count = 16;
      for (let i = 0; i < count; i++) {
        const spokeA = webA.spokes[i % webA.spokes.length];
        const spokeB = webB.spokes[(i * 2 + 3) % webB.spokes.length];

        const ta = 0.28 + (i % 5) * 0.10;
        const tb = 0.24 + ((i + 2) % 5) * 0.11;

        if (isBroken(spokeA, ta) || isBroken(spokeB, tb)) continue;

        const p1 = pointOnSpoke(webA, spokeA, clamp(ta, 0, 0.95));
        const p2 = pointOnSpoke(webB, spokeB, clamp(tb, 0, 0.95));

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(tick * 0.003 + i) * 18;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(tick * 0.003 + i) * 12;

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = getMixedColor(mx, my, 0.05);
        ctx.lineWidth = 0.95;
        ctx.stroke();
      }
    }

    function drawKnotNoise() {
      const knots = [
        { x: webs[0].cx + webs[0].radius * 0.14, y: webs[0].cy + webs[0].radius * 0.04, r: webs[0].radius * 0.10 },
        { x: webs[1].cx - webs[1].radius * 0.10, y: webs[1].cy - webs[1].radius * 0.04, r: webs[1].radius * 0.08 },
        { x: w * 0.56, y: h * 0.50, r: Math.max(w, h) * 0.06 }
      ];

      knots.forEach((knot, idx) => {
        for (let i = 0; i < 10; i++) {
          const a1 = (Math.PI * 2 * i / 10) + Math.sin(tick * 0.003 + i + idx) * 0.25;
          const a2 = a1 + rand(0.4, 1.0);
          const r1 = knot.r * rand(0.18, 0.95);
          const r2 = knot.r * rand(0.18, 0.95);

          const x1 = knot.x + Math.cos(a1) * r1;
          const y1 = knot.y + Math.sin(a1) * r1;
          const x2 = knot.x + Math.cos(a2) * r2;
          const y2 = knot.y + Math.sin(a2) * r2;

          const mx = (x1 + x2) * 0.5 + rand(-8, 8);
          const my = (y1 + y2) * 0.5 + rand(-8, 8);

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(mx, my, x2, y2);
          ctx.strokeStyle = getMixedColor(mx, my, idx === 0 ? 0.06 : 0.04);
          ctx.lineWidth = idx === 0 ? 1.0 : 0.8;
          ctx.stroke();
        }
      });
    }

    function drawTravelFlickers() {
      const web = webs[0];

      for (let i = 0; i < 6; i++) {
        const spoke = web.spokes[(Math.floor(tick * 0.02) + i * 2) % web.spokes.length];
        const p = (Math.sin(tick * 0.02 + i) + 1) * 0.5;
        const point = pointOnSpoke(web, spoke, 0.18 + p * 0.44);

        ctx.beginPath();
        ctx.arc(point.x, point.y, 1.2 + (i % 3) * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = getMixedColor(point.x, point.y, 0.09);
        ctx.fill();
      }
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      webs.forEach(drawGlow);
      webs.forEach(drawRings);
      webs.forEach(drawSpokes);
      drawCrossStitches();
      drawKnotNoise();
      drawTravelFlickers();

      tick += 1;
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
