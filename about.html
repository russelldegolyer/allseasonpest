<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page spider web experiment v2."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --purple:#8b5cf6;
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 46% 43%, rgba(139,92,246,.11), transparent 14%),
        radial-gradient(circle at 18% 22%, rgba(139,92,246,.05), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(139,92,246,.04), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,.003)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 46% 43%, rgba(0,0,0,.02) 0%, rgba(0,0,0,.22) 72%, rgba(0,0,0,.34) 100%),
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.12));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 5px rgba(139,92,246,.34))
        drop-shadow(0 0 16px rgba(139,92,246,.16));
    }

    .center-glow{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 46% 43%, rgba(139,92,246,.16) 0%, rgba(139,92,246,.08) 6%, rgba(139,92,246,.03) 14%, transparent 24%);
      mix-blend-mode:screen;
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>
      <div class="center-glow"></div>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    let backSpokes = [];
    let frontSpokes = [];
    let ringBands = [];
    let motes = [];
    let phase = 0;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function choose(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      initWeb();
    }

    function getCenter() {
      return {
        x: w * 0.46,
        y: h * 0.43
      };
    }

    function makeSpoke(angleBase, layer = "front") {
      const outer = Math.max(w, h) * (layer === "front" ? rand(0.50, 0.83) : rand(0.42, 0.72));
      const brokenCount = Math.random() < 0.65 ? Math.floor(rand(1, 3.99)) : 0;
      const breaks = [];

      for (let i = 0; i < brokenCount; i++) {
        const start = rand(0.18, 0.86);
        const length = rand(0.03, 0.12);
        breaks.push([start, Math.min(0.94, start + length)]);
      }

      breaks.sort((a, b) => a[0] - b[0]);

      return {
        angle: angleBase + rand(-0.16, 0.16),
        maxR: outer,
        currentR: rand(8, 32),
        speed: layer === "front" ? rand(1.0, 1.9) : rand(0.55, 1.15),
        alpha: layer === "front" ? rand(0.48, 0.96) : rand(0.14, 0.34),
        thickness: layer === "front" ? rand(0.75, 2.25) : rand(0.45, 1.1),
        wobble: layer === "front" ? rand(5, 22) : rand(4, 12),
        wobblePhase: rand(0, Math.PI * 2),
        wobbleFreq: rand(3.5, 7.8),
        curl: rand(-0.28, 0.28),
        retracting: false,
        layer,
        breaks,
        bias: rand(0.82, 1.18),
        kink: rand(-0.14, 0.14),
        twitch: rand(0.004, 0.018)
      };
    }

    function initWeb() {
      backSpokes = [];
      frontSpokes = [];
      ringBands = [];
      motes = [];
      phase = 0;

      const mobile = window.innerWidth < 768;
      const frontCount = mobile ? 17 : 24;
      const backCount = mobile ? 10 : 14;

      let angle = -Math.PI * 0.95;
      for (let i = 0; i < frontCount; i++) {
        angle += rand(0.16, 0.42);
        frontSpokes.push(makeSpoke(angle, "front"));
      }

      angle = -Math.PI * 0.90;
      for (let i = 0; i < backCount; i++) {
        angle += rand(0.24, 0.54);
        backSpokes.push(makeSpoke(angle, "back"));
      }

      const ringCount = mobile ? 8 : 11;
      for (let i = 0; i < ringCount; i++) {
        ringBands.push({
          ratio: 0.11 + i * rand(0.058, 0.085),
          alpha: i < 2 ? rand(0.12, 0.22) : rand(0.18, 0.48),
          thickness: rand(0.4, 1.5),
          reveal: rand(0.35, 0.98),
          drift: rand(-0.0008, 0.0008),
          sag: rand(-14, 22),
          brokenChance: rand(0.18, 0.48),
          jitter: rand(2, 10)
        });
      }

      for (let i = 0; i < (mobile ? 16 : 24); i++) {
        motes.push({
          angle: rand(0, Math.PI * 2),
          radius: rand(10, Math.max(w, h) * 0.10),
          size: rand(0.6, 1.8),
          alpha: rand(0.08, 0.22),
          speed: rand(0.002, 0.01),
          drift: rand(-0.2, 0.2)
        });
      }
    }

    function resetSpoke(spoke) {
      const baseAngle = spoke.angle + rand(-0.3, 0.3);
      const replacement = makeSpoke(baseAngle, spoke.layer);
      Object.assign(spoke, replacement);
    }

    function updateSpokes(group) {
      group.forEach((spoke) => {
        if (!spoke.retracting) {
          spoke.currentR += spoke.speed * spoke.bias;
          if (spoke.currentR >= spoke.maxR) {
            spoke.retracting = true;
          }
        } else {
          spoke.currentR -= spoke.speed * rand(0.75, 1.12);
          if (spoke.currentR <= rand(8, 30)) {
            resetSpoke(spoke);
          }
        }

        spoke.wobblePhase += 0.012 + spoke.twitch;
        spoke.angle += Math.sin(phase * 0.6 + spoke.wobblePhase) * 0.0007;
      });
    }

    function updateBands() {
      ringBands.forEach((band, i) => {
        band.ratio += band.drift;
        band.reveal += rand(-0.008, 0.008);
        band.reveal = Math.max(0.18, Math.min(1, band.reveal));
        band.sag += Math.sin(phase * 0.45 + i) * 0.02;

        const minRatio = 0.09 + i * 0.055;
        const maxRatio = minRatio + 0.045;
        if (band.ratio < minRatio || band.ratio > maxRatio) {
          band.drift *= -1;
        }
      });
    }

    function updateMotes() {
      motes.forEach((m) => {
        m.angle += m.speed;
        m.radius += m.drift * 0.03;
      });
    }

    function pointOnSpoke(center, spoke, t, extraSag = 0) {
      const r = spoke.currentR * t;
      const curl = spoke.curl * (t * t) * 85;
      const wobble = Math.sin((t * spoke.wobbleFreq) + spoke.wobblePhase) * spoke.wobble * (0.18 + t * 0.28);
      const kink = Math.sin((t * 10) + spoke.wobblePhase * 0.65) * spoke.kink * 28 * t;

      const baseX = center.x + Math.cos(spoke.angle) * r;
      const baseY = center.y + Math.sin(spoke.angle) * r;

      const normalX = Math.cos(spoke.angle + Math.PI / 2);
      const normalY = Math.sin(spoke.angle + Math.PI / 2);

      return {
        x: baseX + normalX * (wobble + curl + kink),
        y: baseY + normalY * (wobble + kink) + extraSag
      };
    }

    function segmentBlocked(spoke, t) {
      for (const [a, b] of spoke.breaks) {
        if (t >= a && t <= b) return true;
      }
      return false;
    }

    function drawGlow(center) {
      const g = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, Math.max(w, h) * 0.22);
      g.addColorStop(0, "rgba(139,92,246,0.18)");
      g.addColorStop(0.10, "rgba(139,92,246,0.10)");
      g.addColorStop(0.22, "rgba(139,92,246,0.045)");
      g.addColorStop(1, "rgba(139,92,246,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawCenterKnot(center) {
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(center.x, center.y, 6 + i * 7 + Math.sin(phase * 1.2 + i) * 1.1, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(170,125,255,${0.16 - i * 0.04})`;
        ctx.lineWidth = 1.1 - i * 0.2;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(center.x, center.y, 3.4, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(200,175,255,0.55)";
      ctx.fill();
    }

    function drawSpokeGroup(group) {
      const center = getCenter();

      group.forEach((spoke) => {
        const steps = 34;
        let penDown = false;
        let lastPoint = null;

        ctx.beginPath();

        for (let i = 0; i <= steps; i++) {
          const t = i / steps;

          if (segmentBlocked(spoke, t)) {
            penDown = false;
            continue;
          }

          const pt = pointOnSpoke(center, spoke, t);

          if (!penDown) {
            ctx.moveTo(pt.x, pt.y);
            penDown = true;
          } else {
            if (lastPoint) {
              const midX = (lastPoint.x + pt.x) * 0.5;
              const midY = (lastPoint.y + pt.y) * 0.5;
              ctx.quadraticCurveTo(lastPoint.x, lastPoint.y, midX, midY);
            } else {
              ctx.lineTo(pt.x, pt.y);
            }
          }

          lastPoint = pt;
        }

        ctx.strokeStyle =
          spoke.layer === "front"
            ? `rgba(172,126,255,${spoke.alpha})`
            : `rgba(155,110,245,${spoke.alpha})`;

        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        if (lastPoint && !spoke.retracting) {
          ctx.beginPath();
          ctx.arc(lastPoint.x, lastPoint.y, Math.max(0.6, spoke.thickness * 0.72), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(205,180,255,${Math.min(0.85, spoke.alpha * 0.7)})`;
          ctx.fill();
        }
      });
    }

    function drawBandsForGroup(group, softness = 1) {
      const center = getCenter();
      const sorted = [...group].sort((a, b) => a.angle - b.angle);

      ringBands.forEach((band, bandIndex) => {
        const points = [];

        sorted.forEach((spoke, index) => {
          const t = band.ratio;
          const minRequired = 14 + bandIndex * 8;

          if (spoke.currentR * t < minRequired) return;
          if (segmentBlocked(spoke, t)) return;
          if (Math.random() < band.brokenChance * 0.16) return;

          const pt = pointOnSpoke(center, spoke, t, Math.sin(index + phase + bandIndex) * band.jitter * 0.05 + band.sag * 0.03);
          points.push({ ...pt, angle: spoke.angle });
        });

        if (points.length < 4) return;

        const visibleCount = Math.max(3, Math.floor(points.length * band.reveal));
        const use = points.slice(0, visibleCount);

        let started = false;
        ctx.beginPath();

        for (let i = 0; i < use.length; i++) {
          if (i > 0 && Math.random() < band.brokenChance * 0.22) {
            started = false;
            continue;
          }

          const p = use[i];

          if (!started) {
            ctx.moveTo(p.x, p.y);
            started = true;
            continue;
          }

          const prev = use[i - 1];
          const midX = (prev.x + p.x) * 0.5;
          const midY = (prev.y + p.y) * 0.5 + Math.sin(i + phase + bandIndex) * band.sag * 0.08 * softness;
          ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
        }

        ctx.strokeStyle =
          group === frontSpokes
            ? `rgba(183,140,255,${band.alpha})`
            : `rgba(156,112,241,${band.alpha * 0.62})`;

        ctx.lineWidth = band.thickness * softness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawCrossThreads() {
      const center = getCenter();
      const candidates = [...frontSpokes]
        .filter(s => s.currentR > Math.max(w, h) * 0.24)
        .sort((a, b) => a.angle - b.angle);

      for (let i = 0; i < candidates.length - 2; i += 2) {
        if (Math.random() > 0.22) continue;

        const a = candidates[i];
        const b = candidates[i + 2];
        const ta = rand(0.28, 0.74);
        const tb = rand(0.28, 0.74);

        if (segmentBlocked(a, ta) || segmentBlocked(b, tb)) continue;

        const p1 = pointOnSpoke(center, a, ta);
        const p2 = pointOnSpoke(center, b, tb);
        const bendX = (p1.x + p2.x) * 0.5 + rand(-22, 22);
        const bendY = (p1.y + p2.y) * 0.5 + rand(-18, 24);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(bendX, bendY, p2.x, p2.y);
        ctx.strokeStyle = `rgba(170,128,255,${rand(0.08, 0.18)})`;
        ctx.lineWidth = rand(0.45, 1.0);
        ctx.stroke();
      }
    }

    function drawMotes() {
      const center = getCenter();
      motes.forEach((m, i) => {
        const x = center.x + Math.cos(m.angle + phase * 0.12) * m.radius;
        const y = center.y + Math.sin(m.angle + phase * 0.12) * (m.radius * 0.78);

        ctx.beginPath();
        ctx.arc(x, y, m.size + Math.sin(phase + i) * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(190,160,255,${m.alpha})`;
        ctx.fill();
      });
    }

    function update() {
      phase += 0.01;
      updateSpokes(backSpokes);
      updateSpokes(frontSpokes);
      updateBands();
      updateMotes();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      const center = getCenter();

      drawGlow(center);
      drawBandsForGroup(backSpokes, 0.9);
      drawSpokeGroup(backSpokes);
      drawCrossThreads();
      drawBandsForGroup(frontSpokes, 1);
      drawSpokeGroup(frontSpokes);
      drawCenterKnot(center);
      drawMotes();

      update();
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
