<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>About | All Season Pest Control</title>
  <meta
    name="description"
    content="About page spider web experiment."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted-soft:rgba(255,255,255,.56);
      --purple:#8b5cf6;
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --shadow:0 18px 60px rgba(0,0,0,.58);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      background:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 40px;
    }

    .about-stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:calc(100vh - 160px);
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 50%, rgba(139,92,246,.10), transparent 18%),
        radial-gradient(circle at 18% 22%, rgba(139,92,246,.06), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(139,92,246,.05), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,.003)),
        #000;
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .about-stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,.10) 100%),
        linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.10));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter:
        drop-shadow(0 0 6px rgba(139,92,246,.35))
        drop-shadow(0 0 18px rgba(139,92,246,.18));
    }

    .center-glow{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(139,92,246,.16) 0%, rgba(139,92,246,.10) 6%, rgba(139,92,246,.04) 14%, transparent 24%);
      mix-blend-mode:screen;
    }

    .content{
      position:relative;
      z-index:4;
      min-height:calc(100vh - 160px);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:40px 34px 24px;
    }

    .footer{
      width:100%;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.12);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 16px 28px;
      }

      .content{
        padding:26px 18px 18px;
      }
    }

    @media (max-width: 768px){
      .about-stage{
        border-radius:22px;
        min-height:calc(100vh - 132px);
      }

      .content{
        min-height:calc(100vh - 132px);
        padding:22px 14px 14px;
      }

      .footer{
        font-size:.88rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 22px;
      }

      .content{
        padding:18px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html" class="active">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="about-stage" id="aboutStage">
      <canvas class="web-canvas" id="webCanvas"></canvas>
      <div class="center-glow"></div>

      <div class="content">
        <footer class="footer">
          <span>© 2026 All Season Pest Control</span>
          <span>Jonesboro, Arkansas</span>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const stage = document.getElementById("aboutStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    let spokes = [];
    let arcs = [];
    let pulse = 0;

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      initWeb();
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pickCenter() {
      return {
        x: w * 0.5,
        y: h * 0.48
      };
    }

    function initWeb() {
      spokes = [];
      arcs = [];
      pulse = 0;

      const center = pickCenter();
      const outerRadius = Math.max(w, h) * 0.66;
      const spokeCount = window.innerWidth < 768 ? 15 : 21;

      for (let i = 0; i < spokeCount; i++) {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * i / spokeCount) + rand(-0.08, 0.08);
        const maxR = outerRadius * rand(0.82, 1.05);
        const speed = rand(0.9, 1.7);

        spokes.push({
          angle,
          maxR,
          currentR: rand(6, 28),
          speed,
          alpha: rand(0.5, 0.95),
          thickness: rand(0.7, 1.9),
          wobble: rand(4, 16),
          wobblePhase: rand(0, Math.PI * 2),
          fadeDir: 1
        });
      }

      const ringCount = window.innerWidth < 768 ? 7 : 10;
      for (let r = 0; r < ringCount; r++) {
        const radiusRatio = 0.12 + r * (0.075 + rand(-0.006, 0.006));
        arcs.push({
          ratio: radiusRatio,
          alpha: rand(0.18, 0.5),
          thickness: rand(0.5, 1.4),
          reveal: rand(0.2, 0.95),
          drift: rand(-0.0012, 0.0012)
        });
      }
    }

    function getCenter() {
      return {
        x: w * 0.5,
        y: h * 0.48
      };
    }

    function updateWeb() {
      pulse += 0.01;

      spokes.forEach((spoke) => {
        spoke.currentR += spoke.speed * spoke.fadeDir;

        if (spoke.currentR >= spoke.maxR) {
          spoke.fadeDir = -1;
        }

        if (spoke.currentR <= rand(10, 36)) {
          spoke.currentR = rand(8, 24);
          spoke.maxR = Math.max(w, h) * rand(0.54, 0.74);
          spoke.speed = rand(0.9, 1.7);
          spoke.alpha = rand(0.45, 0.98);
          spoke.thickness = rand(0.7, 2.0);
          spoke.wobble = rand(4, 16);
          spoke.wobblePhase = rand(0, Math.PI * 2);
          spoke.fadeDir = 1;
        }

        spoke.wobblePhase += 0.012;
      });

      arcs.forEach((arc, i) => {
        arc.reveal += rand(-0.01, 0.01);
        arc.reveal = Math.max(0.1, Math.min(1, arc.reveal));
        arc.ratio += arc.drift;

        const minRatio = 0.10 + i * 0.07;
        const maxRatio = minRatio + 0.03;

        if (arc.ratio < minRatio || arc.ratio > maxRatio) {
          arc.drift *= -1;
        }
      });
    }

    function drawGlow(center) {
      const g = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, Math.max(w, h) * 0.18);
      g.addColorStop(0, "rgba(139,92,246,0.16)");
      g.addColorStop(0.18, "rgba(139,92,246,0.08)");
      g.addColorStop(0.38, "rgba(139,92,246,0.03)");
      g.addColorStop(1, "rgba(139,92,246,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(center) {
      spokes.forEach((spoke) => {
        const steps = 20;
        let prevX = center.x;
        let prevY = center.y;

        ctx.beginPath();
        ctx.moveTo(prevX, prevY);

        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const r = spoke.currentR * t;
          const wobble = Math.sin((t * 5.5) + spoke.wobblePhase) * spoke.wobble * (t * 0.35);
          const x = center.x + Math.cos(spoke.angle) * r + Math.cos(spoke.angle + Math.PI / 2) * wobble;
          const y = center.y + Math.sin(spoke.angle) * r + Math.sin(spoke.angle + Math.PI / 2) * wobble;
          ctx.lineTo(x, y);
          prevX = x;
          prevY = y;
        }

        ctx.strokeStyle = `rgba(167,123,255,${spoke.alpha})`;
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(prevX, prevY, Math.max(0.7, spoke.thickness * 0.8), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(196,167,255,${Math.min(1, spoke.alpha * 0.9)})`;
        ctx.fill();
      });
    }

    function drawArcBands(center) {
      const sorted = [...spokes].sort((a, b) => a.angle - b.angle);

      arcs.forEach((ring, ringIndex) => {
        const points = [];

        sorted.forEach((spoke) => {
          const usableR = spoke.currentR * ring.ratio;
          const minRequired = 18 + ringIndex * 10;

          if (usableR > minRequired) {
            const wobble = Math.sin((ring.ratio * 10) + spoke.wobblePhase) * spoke.wobble * 0.16;
            const x = center.x + Math.cos(spoke.angle) * usableR + Math.cos(spoke.angle + Math.PI / 2) * wobble;
            const y = center.y + Math.sin(spoke.angle) * usableR + Math.sin(spoke.angle + Math.PI / 2) * wobble;
            points.push({ x, y });
          }
        });

        if (points.length < 3) return;

        const visibleCount = Math.max(2, Math.floor(points.length * ring.reveal));

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < visibleCount - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) * 0.5;
          const midY = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }

        const last = points[visibleCount - 1];
        ctx.lineTo(last.x, last.y);

        ctx.strokeStyle = `rgba(176,134,255,${ring.alpha})`;
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawDust(center) {
      for (let i = 0; i < 18; i++) {
        const angle = (Math.PI * 2 * i / 18) + pulse * 0.4;
        const radius = 18 + (i * 7) + Math.sin(pulse + i) * 3;
        const x = center.x + Math.cos(angle) * radius;
        const y = center.y + Math.sin(angle) * radius;
        const size = 0.8 + ((i % 3) * 0.35);

        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(190,160,255,0.16)";
        ctx.fill();
      }
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      const center = getCenter();

      drawGlow(center);
      drawArcBands(center);
      drawSpokes(center);
      drawDust(center);

      updateWeb();
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });

    resizeCanvas();
    render();
  </script>
</body>
</html>
