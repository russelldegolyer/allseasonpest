<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Services | All Season Pest Control</title>
  <meta
    name="description"
    content="Pest control services from All Season Pest Control in Jonesboro, Arkansas."
  />
  <style>
    :root{
      --text:#ffffff;
      --muted:rgba(255,255,255,.76);
      --shadow:0 18px 60px rgba(0,0,0,.45);

      --gold:#ffd05c;
      --silver:#dddddd;
      --green:#58e08f;
      --red:#ff5c5c;
      --brown:#d09a65;
      --blue:#6ee7eb;

      --active:#ffd05c;
      --max:1200px;
      --glow:0 0 22px rgba(255, 42, 42, 0.22);
      --grid-rgb:255,208,92;
      --parallaxY:0px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(var(--grid-rgb), .09), transparent 28%),
        linear-gradient(180deg, #030303 0%, #000000 100%);
      color:var(--text);
      font-family:Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    a,
    .service-btn{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0, 0, 0, 0.72);
      border-bottom:1px solid rgba(255, 42, 42, 0.22);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255, 42, 42, 0.34);
      border-radius:999px;
      background:rgba(255, 255, 255, 0.03);
      color:#fff;
      font-weight:700;
      font-size:0.95rem;
      letter-spacing:0.02em;
      transition:0.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      border-color:rgba(255, 42, 42, 0.75);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }

    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 64px;
      overflow-x:hidden;
    }

    .showcase{
      position:relative;
      width:100%;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(8,10,15,.92);
      box-shadow:var(--shadow);
      overflow:hidden;
      isolation:isolate;
    }

    .showcase::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 14%, rgba(var(--grid-rgb), .10), transparent 22%),
        radial-gradient(circle at 82% 20%, rgba(var(--grid-rgb), .05), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(var(--grid-rgb), .10), transparent 34%);
      pointer-events:none;
      z-index:1;
    }

    .grid-bg{
      position:absolute;
      inset:-12%;
      z-index:0;
      pointer-events:none;
      transform:translate3d(0, var(--parallaxY), 0) scale(1.05);
      will-change:transform;
    }

    .grid-bg::before,
    .grid-bg::after{
      content:"";
      position:absolute;
      inset:0;
    }

    .grid-bg::before{
      background-image:
        linear-gradient(rgba(var(--grid-rgb), .18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--grid-rgb), .18) 1px, transparent 1px);
      background-size:46px 46px;
      transform:translate3d(0, 0, 0) rotate(-8deg) scale(1.08);
      opacity:.62;
      animation:gridDrift 18s linear infinite;
      filter:
        drop-shadow(0 0 12px rgba(var(--grid-rgb), .14))
        drop-shadow(0 0 26px rgba(var(--grid-rgb), .08));
    }

    .grid-bg::after{
      background:
        radial-gradient(circle at center, rgba(var(--grid-rgb), .18), transparent 58%);
      opacity:.22;
      filter:blur(30px);
      transform:scale(1.08);
    }

    @keyframes gridDrift{
      from{
        transform:translate3d(-24px, -16px, 0) rotate(-8deg) scale(1.08);
      }
      to{
        transform:translate3d(24px, 16px, 0) rotate(-8deg) scale(1.08);
      }
    }

    .grid-vignette-left,
    .grid-vignette-right{
      position:absolute;
      top:0;
      bottom:0;
      width:120px;
      z-index:1;
      pointer-events:none;
    }

    .grid-vignette-left{
      left:0;
      background:linear-gradient(90deg, rgba(8,10,15,.94), rgba(8,10,15,0));
    }

    .grid-vignette-right{
      right:0;
      background:linear-gradient(270deg, rgba(8,10,15,.94), rgba(8,10,15,0));
    }

    .panel-wrap{
      position:relative;
      z-index:3;
      padding:22px 22px 8px;
    }

    .focus-card{
      width:100%;
      max-width:840px;
      margin:0 auto;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)),
        rgba(10,12,18,.84);
      backdrop-filter:blur(14px);
      box-shadow:0 18px 60px rgba(0,0,0,.42);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease;
      position:relative;
    }

    .cursor-glow{
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      pointer-events:none;
      left:0;
      top:0;
      transform:translate(-50%, -50%);
      opacity:0;
      transition:opacity .18s ease;
      z-index:1;
      background:radial-gradient(
        circle,
        color-mix(in srgb, var(--active) 22%, transparent) 0%,
        color-mix(in srgb, var(--active) 10%, transparent) 30%,
        transparent 72%
      );
      filter:blur(10px);
    }

    .focus-top,
    .focus-content{
      position:relative;
      z-index:2;
    }

    .focus-top{
      padding:28px 28px 20px;
      border-bottom:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
        radial-gradient(circle at top right, color-mix(in srgb, var(--active) 18%, transparent), transparent 46%);
    }

    .focus-top::after{
      content:"";
      position:absolute;
      inset:auto -90px -90px auto;
      width:230px;
      height:230px;
      border-radius:50%;
      background:radial-gradient(circle, color-mix(in srgb, var(--active) 34%, transparent) 0%, transparent 68%);
      pointer-events:none;
      filter:blur(2px);
    }

    .focus-head{
      position:relative;
      z-index:2;
      display:flex;
      align-items:flex-start;
      gap:16px;
      width:100%;
    }

    .focus-copy{
      flex:1 1 auto;
      min-width:0;
    }

    .focus-badge{
      width:56px;
      height:56px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:none;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color:var(--active);
      box-shadow:0 0 22px color-mix(in srgb, var(--active) 12%, transparent);
    }

    .focus-badge svg{
      width:28px;
      height:28px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .focus-kicker{
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.72rem;
      font-weight:900;
      color:var(--active);
      margin-bottom:10px;
    }

    .focus-title{
      font-size:clamp(1.65rem, 3vw, 2.85rem);
      line-height:1;
      letter-spacing:-.05em;
      margin-bottom:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .focus-desc{
      color:var(--muted);
      font-size:.98rem;
      line-height:1.76;
      max-width:60ch;
      overflow-wrap:anywhere;
    }

    .focus-content{
      padding:20px 28px 28px;
      width:100%;
    }

    .focus-sub{
      color:rgba(255,255,255,.95);
      font-size:.96rem;
      line-height:1.8;
      margin-bottom:18px;
      overflow-wrap:anywhere;
    }

    .info-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      width:100%;
    }

    .info-box{
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      background:rgba(255,255,255,.03);
      padding:15px 15px 14px;
    }

    .info-box .label{
      text-transform:uppercase;
      letter-spacing:.15em;
      font-size:.68rem;
      font-weight:900;
      color:var(--active);
      margin-bottom:8px;
    }

    .info-box p{
      color:#f3f3f3;
      line-height:1.72;
      font-size:.93rem;
      overflow-wrap:anywhere;
    }

    .service-selector-bottom{
      position:relative;
      z-index:3;
      padding:14px 18px 18px;
      border-top:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(5,7,11,.10), rgba(5,7,11,.28));
      backdrop-filter:blur(6px);
    }

    .service-rail{
      display:flex;
      gap:14px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:14px 26px 18px;
      margin:0 -8px;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-x:contain;
      justify-content:flex-start;
      align-items:center;
      scroll-snap-type:x mandatory;
      scroll-padding-inline:26px;
      scroll-behavior:auto;
      touch-action:pan-x;
    }

    .service-rail::-webkit-scrollbar{
      display:none;
    }

    .service-btn{
      flex:0 0 212px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#fff;
      border-radius:20px;
      padding:15px 15px 14px;
      text-align:left;
      cursor:pointer;
      transition:
        border-color .18s ease,
        box-shadow .18s ease,
        background .18s ease,
        transform .22s ease,
        opacity .22s ease;
      transform:scale(.92);
      opacity:.66;
      scroll-snap-align:center;
    }

    .service-btn.near-active{
      transform:scale(.96);
      opacity:.86;
    }

    .service-btn.active{
      border-color:color-mix(in srgb, var(--active) 58%, transparent);
      background:linear-gradient(
        180deg,
        color-mix(in srgb, var(--active) 12%, rgba(255,255,255,.03)),
        rgba(255,255,255,.03)
      );
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--active) 18%, transparent) inset,
        0 0 28px color-mix(in srgb, var(--active) 12%, transparent);
      transform:scale(1);
      opacity:1;
    }

    .service-btn-top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:6px;
    }

    .service-icon{
      width:36px;
      height:36px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.04);
      color:var(--active);
      flex:none;
      transition:width .22s ease, height .22s ease, border-radius .22s ease;
    }

    .service-icon svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .service-btn .kicker{
      display:block;
      font-size:.62rem;
      letter-spacing:.15em;
      text-transform:uppercase;
      color:rgba(255,255,255,.56);
      font-weight:800;
      margin-bottom:4px;
      transition:font-size .22s ease;
    }

    .service-btn.active .kicker{
      font-size:.68rem;
    }

    .service-btn .name{
      display:block;
      font-size:.94rem;
      font-weight:800;
      letter-spacing:-.02em;
      line-height:1.1;
      word-break:break-word;
      transition:font-size .22s ease;
      min-height:2.25em;
    }

    .service-btn.active .name{
      font-size:1.08rem;
    }

    @media (max-width: 1024px){
      .cursor-glow{
        display:none;
      }

      .grid-bg{
        inset:-8%;
        transform:translate3d(0, 0, 0) scale(1.04);
      }

      .grid-bg::before{
        opacity:.52;
      }
    }

    @media (max-width: 900px){
      .page-wrap{
        padding:98px 24px 46px;
      }

      .focus-title{
        font-size:clamp(1.45rem, 2.9vw, 2.3rem);
      }
    }

    @media (max-width: 768px){
      .topbar-inner{
        padding:14px 14px;
      }

      .nav a{
        padding:10px 14px;
        font-size:0.9rem;
      }

      .page-wrap{
        padding:92px 10px 34px;
      }

      .showcase{
        border-radius:22px;
      }

      .grid-vignette-left,
      .grid-vignette-right{
        width:56px;
      }

      .panel-wrap{
        padding:10px 10px 4px;
      }

      .focus-card{
        border-radius:20px;
      }

      .focus-top{
        padding:18px 16px 14px;
      }

      .focus-top::after{
        width:170px;
        height:170px;
        inset:auto -64px -64px auto;
      }

      .focus-head{
        gap:12px;
      }

      .focus-badge{
        width:44px;
        height:44px;
        border-radius:14px;
      }

      .focus-badge svg{
        width:22px;
        height:22px;
      }

      .focus-kicker{
        font-size:.62rem;
        margin-bottom:8px;
      }

      .focus-title{
        font-size:1.4rem;
        margin-bottom:10px;
      }

      .focus-desc{
        font-size:.9rem;
        line-height:1.58;
      }

      .focus-content{
        padding:14px 16px 16px;
      }

      .focus-sub{
        font-size:.9rem;
        line-height:1.6;
        margin-bottom:14px;
      }

      .info-grid{
        grid-template-columns:1fr;
        gap:10px;
      }

      .info-box{
        border-radius:14px;
        padding:13px 13px 12px;
      }

      .info-box .label{
        font-size:.62rem;
        margin-bottom:7px;
      }

      .info-box p{
        font-size:.87rem;
        line-height:1.58;
      }

      .service-selector-bottom{
        padding:10px 10px 14px;
      }

      .service-rail{
        gap:8px;
        padding:10px 16px 10px;
        scroll-padding-inline:16px;
      }

      .service-btn{
        flex:0 0 148px;
        border-radius:14px;
        padding:10px;
        transform:scale(.88);
        opacity:.62;
      }

      .service-btn.near-active{
        transform:scale(.95);
        opacity:.84;
      }

      .service-btn.active{
        padding:10px;
        transform:scale(1);
        opacity:1;
      }

      .service-icon{
        width:30px;
        height:30px;
        border-radius:10px;
      }

      .service-icon svg{
        width:15px;
        height:15px;
      }

      .service-btn .kicker{
        font-size:.54rem;
      }

      .service-btn.active .kicker{
        font-size:.60rem;
      }

      .service-btn .name{
        font-size:.78rem;
        min-height:2.28em;
      }

      .service-btn.active .name{
        font-size:.92rem;
      }
    }

    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }

      .nav{
        gap:8px;
      }

      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }

      .page-wrap{
        padding:88px 8px 28px;
      }

      .focus-title{
        font-size:1.16rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html" class="active">Services</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="showcase">
      <div class="grid-bg" id="gridBg" aria-hidden="true"></div>
      <div class="grid-vignette-left" aria-hidden="true"></div>
      <div class="grid-vignette-right" aria-hidden="true"></div>

      <div class="panel-wrap">
        <div class="focus-card" id="focusCard">
          <div class="cursor-glow" id="cursorGlow"></div>

          <div class="focus-top">
            <div class="focus-head">
              <div class="focus-badge" id="focusBadge"></div>

              <div class="focus-copy">
                <div class="focus-kicker" id="focusKicker"></div>
                <h2 class="focus-title" id="focusTitle"></h2>
                <p class="focus-desc" id="focusDesc"></p>
              </div>
            </div>
          </div>

          <div class="focus-content">
            <p class="focus-sub" id="focusSub"></p>

            <div class="info-grid">
              <div class="info-box">
                <div class="label" id="box1Label"></div>
                <p id="box1Text"></p>
              </div>
              <div class="info-box">
                <div class="label" id="box2Label"></div>
                <p id="box2Text"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="service-selector-bottom">
        <div class="service-rail" id="serviceRail"></div>
      </div>
    </section>
  </main>

  <script>
    const iconMap = {

      `,
      leaf: `

          <path d="M8 16c2.5-2.4 4.8-4 8-5.5"/>
        </svg>
      `
    };

    const baseServices = [
      {
        id: "general",
        color: "#ffd05c",
        rgb: "255,208,92",
        icon: "bug",
        kicker: "Core Service",
        title: "General Pest Control",
        buttonTitle: "General Pest Control",
        desc: "Built for common pest pressure around the home and designed to help keep activity down through consistent, dependable treatment.",

        box1Text: "Exterior foundation and eave treatment with full front to back curb spot treatment as needed.",
        box2Label: "Important Note",
        box2Text: "Interior/garage sprays are optional, not mandatory."

      {
        id: "rodent",
        color: "#dddddd",
        rgb: "221,221,221",
        icon: "shield",

        title: "Rodent Control",
        buttonTitle: "Rodent Control",
        desc: "Focused on reducing and monitoring rodent activity through strategic bait placement and ongoing follow-up where needed.",
        sub: "Service includes inspection of active areas, exterior bait stations, sticky traps, and recommendations to help reduce conditions that contribute to rodent pressure around the home.",
        box1Label: "Service Focus",
        box1Text: "Ongoing monitoring, activity reduction, baiting, and follow-up based on the level of rodent pressure.",
        box2Label: "Important Note",
        box2Text: "Does not include moles, snakes, skunks, or squirrels."
      },
      {
        id: "tickflea",
        color: "#58e08f",
        rgb: "88,224,143",
        icon: "paw",
        kicker: "Granular Service",
        title: "Tick & Flea Treatment",
        buttonTitle: "Tick & Flea Treatment",
        desc: "Designed for properties dealing with biting pests in the yard, around pet areas, or in outdoor spaces where activity builds up.",
        sub: "These treatments focus on helping reduce active populations and improving control in the areas where ticks and fleas are most likely to be found. This is a granular product used in the yard.",
        box1Label: "Best For",
        box1Text: "Homes with pets, shaded yards, wildlife traffic, or recurring tick and flea activity outside.",
        box2Label: "Important Note",
        box2Text: "This is an optional add-on service for general pests."
      },
      {
        id: "mosquito",
        color: "#ff5c5c",
        rgb: "255,92,92",
        icon: "mosquito",
        kicker: "Seasonal Treatment",
        title: "Mosquito Treatment",
        buttonTitle: "Mosquito Treatment",
        desc: "Designed to help reduce mosquito pressure in the yard so you can enjoy outdoor areas more comfortably during the warmer months.",
        sub: "Treatment is typically focused on shaded foliage, harborage areas, and other outdoor zones where mosquitoes like to rest and build up. This is a recurring service from April-September.",
        box1Label: "Best For",
        box1Text: "Homes with patios, backyards, pets, or heavy mosquito pressure during the season.",
        box2Label: "Service Approach",
        box2Text: "Treating nesting and breeding points in the yard."
      },
      {
        id: "roach",
        color: "#d09a65",
        rgb: "208,154,101",
        icon: "target",
        kicker: "Specialized Treatment",
        title: "German Roach Treatment",
        buttonTitle: "German Roach Treatment",
        desc: "Built for active infestations that need more aggressive and targeted attention than standard routine pest service.",
        sub: "Treatment may include detailed inspection, targeted crack-and-crevice applications, baiting, and follow-up service depending on the level of activity and conditions inside the home.",
        box1Label: "Best For",
        box1Text: "Active german roach infestations that need more than routine recurring service.",
        box2Label: "Important Note",
        box2Text: "Results depend heavily on severity and sanitation."
      },
      {
        id: "weed",
        color: "#6ee7eb",
        rgb: "110,231,235",
        icon: "leaf",
        kicker: "Specialized Treatment",
        title: "Weed Control",
        buttonTitle: "Weed Control",
        desc: "Designed to help reduce unwanted weed growth and improve the overall appearance of the property.",
        sub: "Treatment plans are based on the season, weed pressure, and the overall condition of the area being treated. Treatments are done in the early spring and again in late summer.",
        box1Label: "Best For",
        box1Text: "Properties dealing with visible weed pressure in the rocks, gravel, sand, along edges, and other non-lawn areas.",
        box2Label: "Service Approach",
        box2Text: "Price varies by total square feet of treatment."
      }
    ];

    const serviceRail = document.getElementById("serviceRail");
    const focusCard = document.getElementById("focusCard");
    const cursorGlow = document.getElementById("cursorGlow");
    const focusBadge = document.getElementById("focusBadge");
    const focusKicker = document.getElementById("focusKicker");
    const focusTitle = document.getElementById("focusTitle");
    const focusDesc = document.getElementById("focusDesc");
    const focusSub = document.getElementById("focusSub");
    const box1Label = document.getElementById("box1Label");
    const box1Text = document.getElementById("box1Text");
    const box2Label = document.getElementById("box2Label");
    const box2Text = document.getElementById("box2Text");
    const rootStyle = document.documentElement.style;
    const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

    const cloneRepeat = 2;
    let currentActiveId = "general";
    let touchStartX = 0;
    let touchStartY = 0;
    let touchLocked = false;
    let isAnimatingSwipe = false;
    let suppressTapAfterSwipe = false;
    let tickingParallax = false;

    function triggerHaptic(pattern = 12) {
      try {
        if (isTouchDevice && "vibrate" in navigator) {
          navigator.vibrate(pattern);
        }
      } catch (_) {}
    }

    function getRailServices() {
      const before = [];
      const after = [];

      for (let i = 0; i < cloneRepeat; i++) {
        before.push(...baseServices);
        after.push(...baseServices);
      }

      return [...before, ...baseServices, ...after];
    }

    function renderButtons() {
      serviceRail.innerHTML = "";
      const railServices = getRailServices();

      railServices.forEach((service, index) => {
        const button = document.createElement("button");
        button.className = "service-btn";
        button.dataset.id = service.id;
        button.dataset.index = index;
        button.style.setProperty("--active", service.color);

        button.innerHTML = `
          <div class="service-btn-top">
            <div class="service-icon">${iconMap[service.icon]}</div>
            <div>
              <span class="kicker">${service.kicker}</span>
              <span class="name">${service.buttonTitle || service.title}</span>
            </div>
          </div>
        `;

        button.addEventListener("click", () => {
          if (suppressTapAfterSwipe || isAnimatingSwipe) return;
          triggerHaptic(12);
          goToServiceById(service.id);
        });

        serviceRail.appendChild(button);
      });
    }

    function getButtonsById(id) {
      return [...document.querySelectorAll(`.service-btn[data-id="${id}"]`)];
    }

    function getMiddleSetButton(id) {
      const buttons = getButtonsById(id);
      const segmentLength = baseServices.length;
      const middleIndexStart = segmentLength * cloneRepeat;

      return buttons.find(btn => {
        const idx = Number(btn.dataset.index);
        return idx >= middleIndexStart && idx < middleIndexStart + segmentLength;
      }) || buttons[0] || null;
    }

    function centerButton(button, smooth = true) {
      if (!button) return;

      const targetLeft =
        button.offsetLeft - (serviceRail.clientWidth / 2) + (button.clientWidth / 2);

      serviceRail.scrollTo({
        left: targetLeft,
        behavior: smooth ? "smooth" : "auto"
      });
    }

    function updateRailClasses(activeButton) {
      const allButtons = [...document.querySelectorAll(".service-btn")];
      allButtons.forEach(btn => btn.classList.remove("near-active"));

      if (!activeButton) return;

      const rect = activeButton.getBoundingClientRect();
      const activeCenter = rect.left + rect.width / 2;

      allButtons.forEach(btn => {
        if (btn === activeButton) return;
        const r = btn.getBoundingClientRect();
        const center = r.left + r.width / 2;
        const dist = Math.abs(center - activeCenter);
        if (dist < 340) {
          btn.classList.add("near-active");
        }
      });
    }

    function normalizeRailPosition() {
      const targetButton = getMiddleSetButton(currentActiveId);
      if (!targetButton) return;
      centerButton(targetButton, false);
      updateRailClasses(targetButton);
    }

    function setThemeColor(service) {
      rootStyle.setProperty("--active", service.color);
      rootStyle.setProperty("--grid-rgb", service.rgb);
    }

    function updateServiceContent(service) {
      currentActiveId = service.id;
      setThemeColor(service);

      document.querySelectorAll(".service-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.id === service.id);
      });

      focusBadge.innerHTML = iconMap[service.icon];
      focusBadge.style.color = service.color;

      focusKicker.textContent = service.kicker;
      focusTitle.textContent = service.title;
      focusTitle.title = service.title;
      focusDesc.textContent = service.desc;
      focusSub.textContent = service.sub;
      box1Label.textContent = service.box1Label;
      box1Text.textContent = service.box1Text;
      box2Label.textContent = service.box2Label;
      box2Text.textContent = service.box2Text;

      focusKicker.style.color = service.color;
      document.querySelectorAll(".label").forEach(label => {
        label.style.color = service.color;
      });

      focusCard.style.borderColor = `${service.color}44`;
      focusCard.style.boxShadow = `0 18px 60px rgba(0,0,0,.42), 0 0 34px ${service.color}14`;
    }

    function getServiceIndexById(id) {
      return baseServices.findIndex(service => service.id === id);
    }

    function goToServiceIndex(index) {
      const total = baseServices.length;
      const wrappedIndex = (index + total) % total;
      const nextService = baseServices[wrappedIndex];
      const middleButton = getMiddleSetButton(nextService.id);

      if (!middleButton) return;

      isAnimatingSwipe = true;
      updateServiceContent(nextService);

      centerButton(middleButton, true);
      updateRailClasses(middleButton);

      setTimeout(() => {
        const snapButton = getMiddleSetButton(nextService.id);
        centerButton(snapButton, false);
        updateRailClasses(snapButton);
        isAnimatingSwipe = false;
      }, 260);
    }

    function goToServiceById(id) {
      const index = getServiceIndexById(id);
      if (index === -1) return;
      goToServiceIndex(index);
    }

    function stepService(direction) {
      if (isAnimatingSwipe) return;

      const currentIndex = getServiceIndexById(currentActiveId);
      if (currentIndex === -1) return;

      triggerHaptic(10);
      goToServiceIndex(currentIndex + direction);
    }

    function updateParallax() {
      tickingParallax = false;

      if (window.innerWidth <= 1024) {
        rootStyle.setProperty("--parallaxY", "0px");
        return;
      }

      const y = Math.min(window.scrollY * 0.12, 42);
      rootStyle.setProperty("--parallaxY", `${y}px`);
    }

    function requestParallax() {
      if (tickingParallax) return;
      tickingParallax = true;
      requestAnimationFrame(updateParallax);
    }

    renderButtons();
    updateServiceContent(baseServices[0]);

    requestAnimationFrame(() => {
      normalizeRailPosition();
      updateParallax();
    });

    serviceRail.addEventListener("touchstart", (event) => {
      if (window.innerWidth > 768) return;
      if (!event.touches.length) return;

      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
      touchLocked = false;
      suppressTapAfterSwipe = false;
    }, { passive: true });

    serviceRail.addEventListener("touchmove", (event) => {
      if (window.innerWidth > 768) return;
      if (!event.touches.length || isAnimatingSwipe) return;

      const deltaX = event.touches[0].clientX - touchStartX;
      const deltaY = event.touches[0].clientY - touchStartY;

      if (touchLocked) {
        event.preventDefault();
        return;
      }

      if (Math.abs(deltaX) > 22 && Math.abs(deltaX) > Math.abs(deltaY)) {
        touchLocked = true;
        suppressTapAfterSwipe = true;
        event.preventDefault();
      }
    }, { passive: false });

    serviceRail.addEventListener("touchend", (event) => {
      if (window.innerWidth > 768) return;
      if (isAnimatingSwipe) return;

      const changedTouch = event.changedTouches && event.changedTouches[0];
      if (!changedTouch) return;

      const deltaX = changedTouch.clientX - touchStartX;
      const deltaY = changedTouch.clientY - touchStartY;

      if (Math.abs(deltaX) > 38 && Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX < 0) {
          stepService(1);
        } else {
          stepService(-1);
        }

        setTimeout(() => {
          suppressTapAfterSwipe = false;
        }, 250);
      } else {
        const middleButton = getMiddleSetButton(currentActiveId);
        centerButton(middleButton, true);
        updateRailClasses(middleButton);
        suppressTapAfterSwipe = false;
      }

      touchLocked = false;
    }, { passive: true });

    serviceRail.addEventListener("scroll", () => {
      if (window.innerWidth > 768 || isAnimatingSwipe) return;
      const middleButton = getMiddleSetButton(currentActiveId);
      updateRailClasses(middleButton);
    }, { passive: true });

    window.addEventListener("resize", () => {
      updateServiceContent(baseServices[getServiceIndexById(currentActiveId)] || baseServices[0]);
      normalizeRailPosition();
      isAnimatingSwipe = false;
      suppressTapAfterSwipe = false;
      updateParallax();
    });

    window.addEventListener("scroll", requestParallax, { passive: true });

    if (window.innerWidth > 1024) {
      focusCard.addEventListener("mousemove", (event) => {
        const rect = focusCard.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        cursorGlow.style.left = `${x}px`;
        cursorGlow.style.top = `${y}px`;
        cursorGlow.style.opacity = "1";
      });

      focusCard.addEventListener("mouseenter", () => {
        cursorGlow.style.opacity = "1";
      });

      focusCard.addEventListener("mouseleave", () => {
        cursorGlow.style.opacity = "0";
      });
    }
  </script>
</body>
</html>
