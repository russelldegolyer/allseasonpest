<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Services | All Season Pest Control</title>
  <meta
    name="description"
    content="Pest control services from All Season Pest Control in Jonesboro, Arkansas."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --text:#ffffff;
      --muted:rgba(255,255,255,.80);
      --muted-soft:rgba(255,255,255,.54);
      --shadow:0 18px 60px rgba(0,0,0,.58);
      --gold:#ffd05c;
      --silver:#dddddd;
      --green:#58e08f;
      --red:#ff5c5c;
      --brown:#d09a65;
      --blue:#6ee7eb;
      --active:#ffd05c;
      --max:1200px;
      --glow:0 0 22px rgba(255,255,255,.12);
      --grid-rgb:255,208,92;
      --parallaxY:0px;
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      min-width:0;
    }
    html{
      scroll-behavior:smooth;
      background:#000;
    }
    body{
      background:
        radial-gradient(circle at top, rgba(var(--grid-rgb), .045), transparent 28%),
        linear-gradient(180deg, #000000 0%, #000000 100%);
      background-color:#000;
      color:var(--text);
      font-family:"Sora", Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }
    a{
      color:inherit;
      text-decoration:none;
    }
    button,
    a,
    .service-btn{
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }
    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      backdrop-filter:blur(14px);
      background:rgba(0, 0, 0, 0.86);
      border-bottom:1px solid rgba(255,255,255,.24);
    }
    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .nav a{
      padding:11px 18px;
      border:1px solid rgba(255,255,255,.34);
      border-radius:999px;
      background:rgba(255,255,255,.01);
      color:#fff;
      font-family:"Oswald", Arial, sans-serif;
      font-weight:600;
      font-size:0.98rem;
      letter-spacing:0.04em;
      text-transform:uppercase;
      transition:0.2s ease;
    }
    .nav a:hover,
    .nav a.active{
      border-color:rgba(255,255,255,.84);
      box-shadow:var(--glow);
      transform:translateY(-1px);
    }
    .page-wrap{
      max-width:1240px;
      margin:0 auto;
      padding:104px 20px 64px;
      overflow-x:hidden;
    }
    .showcase{
      position:relative;
      width:100%;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.004), rgba(255,255,255,.001)),
        rgba(0,0,0,.995);
      box-shadow:var(--shadow);
      overflow:hidden;
      isolation:isolate;
    }
    .showcase::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 14%, rgba(var(--grid-rgb), .035), transparent 22%),
        radial-gradient(circle at 82% 20%, rgba(var(--grid-rgb), .018), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(var(--grid-rgb), .035), transparent 34%);
      pointer-events:none;
      z-index:1;
    }
    .grid-bg{
      position:absolute;
      inset:-12%;
      z-index:0;
      pointer-events:none;
      transform:translate3d(0, var(--parallaxY), 0) scale(1.05);
      will-change:transform;
    }
    .grid-bg::before,
    .grid-bg::after{
      content:"";
      position:absolute;
      inset:0;
    }
    .grid-bg::before{
      background-image:
        linear-gradient(rgba(var(--grid-rgb), .22) 1.15px, transparent 1.15px),
        linear-gradient(90deg, rgba(var(--grid-rgb), .22) 1.15px, transparent 1.15px);
      background-size:46px 46px;
      transform:translate3d(0, 0, 0) rotate(-8deg) scale(1.08);
      opacity:.68;
      animation: gridDrift 28s linear infinite;
      filter:
        drop-shadow(0 0 10px rgba(var(--grid-rgb), .10))
        drop-shadow(0 0 18px rgba(var(--grid-rgb), .05));
    }
    .grid-bg::after{
      background:
        radial-gradient(circle at center, rgba(var(--grid-rgb), .055), transparent 58%);
      opacity:.10;
      filter:blur(28px);
      transform:scale(1.08);
    }

    /* === IMPROVED CONTINUOUS GRID ANIMATION === */
    @keyframes gridDrift {
      from {
        transform: translate3d(-28px, -18px, 0) rotate(-8deg) scale(1.08);
      }
      to {
        transform: translate3d(28px, 18px, 0) rotate(-8deg) scale(1.08);
      }
    }

    .grid-vignette-left,
    .grid-vignette-right{
      position:absolute;
      top:0;
      bottom:0;
      width:120px;
      z-index:1;
      pointer-events:none;
    }
    .grid-vignette-left{
      left:0;
      background:linear-gradient(90deg, rgba(0,0,0,.985), rgba(0,0,0,0));
    }
    .grid-vignette-right{
      right:0;
      background:linear-gradient(270deg, rgba(0,0,0,.985), rgba(0,0,0,0));
    }
    .panel-wrap{
      position:relative;
      z-index:3;
      padding:18px 18px 8px;
    }
    .focus-card{
      width:100%;
      max-width:840px;
      margin:0 auto;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.085);
      background:
        linear-gradient(180deg, rgba(255,255,255,.006), rgba(255,255,255,.001)),
        rgba(0,0,0,.975);
      backdrop-filter:blur(4px);
      box-shadow:0 18px 60px rgba(0,0,0,.62);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease;
      position:relative;
    }
    .cursor-glow{
      position:absolute;
      width:130px;
      height:130px;
      border-radius:50%;
      pointer-events:none;
      left:0;
      top:0;
      transform:translate(-50%, -50%);
      opacity:0;
      transition:opacity .18s ease;
      z-index:1;
      background:radial-gradient(
        circle,
        color-mix(in srgb, var(--active) 31%, transparent) 0%,
        color-mix(in srgb, var(--active) 15%, transparent) 34%,
        transparent 72%
      );
      filter:blur(8px);
    }
    .mobile-card-grid{
      display:none;
    }
    /* ... rest of your original styles remain unchanged ... */
    .focus-top,
    .focus-content{
      position:relative;
      z-index:2;
    }
    .focus-top{
      padding:24px 24px 16px;
      border-bottom:1px solid rgba(255,255,255,.055);
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.003), rgba(255,255,255,0));
    }
    .focus-head{
      position:relative;
      z-index:2;
      display:flex;
      align-items:flex-start;
      gap:16px;
      width:100%;
    }
    .focus-copy{
      flex:1 1 auto;
      min-width:0;
    }
    .focus-badge{
      width:56px;
      height:56px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:none;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.01);
      color:var(--active);
    }
    .focus-badge svg{
      width:28px;
      height:28px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .focus-kicker{
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.72rem;
      font-weight:900;
      color:var(--active);
      margin-bottom:8px;
      font-family:"Oswald", Arial, sans-serif;
    }
    .focus-title{
      font-family:"Oswald", Arial, sans-serif;
      font-size:clamp(1.65rem, 3vw, 2.85rem);
      font-weight:600;
      line-height:1;
      letter-spacing:-.02em;
      margin-bottom:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-transform:uppercase;
    }
    .focus-desc{
      color:var(--muted);
      font-size:.98rem;
      line-height:1.7;
      max-width:60ch;
      overflow-wrap:anywhere;
    }
    .focus-content{
      padding:16px 24px 22px;
      width:100%;
    }
    .focus-sub{
      color:rgba(255,255,255,.93);
      font-size:.96rem;
      line-height:1.75;
      margin-bottom:14px;
      overflow-wrap:anywhere;
    }
    .info-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
      width:100%;
    }
    .info-box{
      border:1px solid rgba(255,255,255,.065);
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.003), rgba(255,255,255,.001)),
        rgba(0,0,0,.96);
      padding:14px 14px 13px;
      position:relative;
      z-index:2;
    }
    .info-box .label{
      text-transform:uppercase;
      letter-spacing:.15em;
      font-size:.68rem;
      font-weight:900;
      color:var(--active);
      margin-bottom:8px;
      font-family:"Oswald", Arial, sans-serif;
    }
    .info-box p{
      color:#f3f3f3;
      line-height:1.68;
      font-size:.93rem;
      overflow-wrap:anywhere;
    }
    .service-selector-bottom{
      position:relative;
      z-index:3;
      padding:12px 16px 16px;
      border-top:1px solid rgba(255,255,255,.055);
      background:linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.34));
      backdrop-filter:blur(2px);
    }
    .service-rail{
      display:flex;
      gap:14px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:12px 26px 14px;
      margin:0 -8px;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-x:contain;
      justify-content:flex-start;
      align-items:center;
      scroll-snap-type:x mandatory;
      scroll-padding-inline:26px;
      scroll-behavior:auto;
      touch-action:pan-x;
    }
    .service-rail::-webkit-scrollbar{
      display:none;
    }
    .service-btn{
      flex:0 0 212px;
      border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,.003), rgba(255,255,255,.001)),
        rgba(0,0,0,.955);
      color:#fff;
      border-radius:20px;
      padding:15px 15px 14px;
      text-align:left;
      cursor:pointer;
      transition:
        border-color .18s ease,
        box-shadow .18s ease,
        background .18s ease,
        transform .22s ease,
        opacity .22s ease;
      transform:scale(.92);
      opacity:.66;
      scroll-snap-align:center;
    }
    .service-btn.near-active{
      transform:scale(.96);
      opacity:.86;
    }
    .service-btn.active{
      border-color:color-mix(in srgb, var(--active) 46%, rgba(255,255,255,.05));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--active) 5%, rgba(255,255,255,.003)), rgba(255,255,255,.001)),
        rgba(2,2,2,.975);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--active) 10%, transparent) inset;
      transform:scale(1);
      opacity:1;
    }
    .service-btn-top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:6px;
    }
    .service-icon{
      width:36px;
      height:36px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.01);
      color:var(--active);
      flex:none;
      transition:width .22s ease, height .22s ease, border-radius .22s ease;
    }
    .service-icon svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .service-btn .kicker{
      display:block;
      font-size:.62rem;
      letter-spacing:.15em;
      text-transform:uppercase;
      color:rgba(255,255,255,.56);
      font-weight:800;
      margin-bottom:4px;
      transition:font-size .22s ease;
      font-family:"Oswald", Arial, sans-serif;
    }
    .service-btn.active .kicker{
      font-size:.68rem;
    }
    .service-btn .name{
      display:block;
      font-family:"Oswald", Arial, sans-serif;
      font-size:.94rem;
      font-weight:600;
      letter-spacing:.01em;
      line-height:1.1;
      word-break:break-word;
      transition:font-size .22s ease;
      min-height:2.25em;
      text-transform:uppercase;
    }
    .service-btn.active .name{
      font-size:1.08rem;
    }
    .footer{
      position:relative;
      z-index:3;
      padding:0 22px 22px;
    }
    .footer-inner{
      border-top:1px solid rgba(255,255,255,.08);
      padding-top:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-soft);
      font-size:.94rem;
    }

    /* Responsive styles (unchanged from your original) */
    @media (max-width: 1024px){
      .cursor-glow{
        display:none;
      }
      .grid-bg{
        inset:-8%;
        transform:translate3d(0, 0, 0) scale(1.04);
      }
      .grid-bg::before{
        opacity:.50;
      }
      .focus-card{
        max-width:820px;
      }
    }
    @media (max-width: 900px){
      .page-wrap{
        padding:98px 24px 46px;
      }
      .focus-title{
        font-size:clamp(1.45rem, 2.9vw, 2.3rem);
      }
    }
    @media (max-width: 768px){
      body{
        background:#000;
        background-color:#000;
      }
      .showcase{
        background:#000;
      }
      .showcase::before{
        display:none;
      }
      .grid-bg{
        display:none;
      }
      .grid-vignette-left,
      .grid-vignette-right{
        display:none;
      }
      /* ... rest of your mobile styles remain the same ... */
      .topbar-inner{
        padding:14px 14px;
      }
      .nav a{
        padding:10px 14px;
        font-size:0.9rem;
      }
      .page-wrap{
        padding:92px 10px 34px;
      }
      .showcase{
        border-radius:22px;
      }
      .panel-wrap{
        padding:12px 12px 4px;
      }
      .focus-card{
        border-radius:20px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.002)),
          rgba(0,0,0,.985);
      }
      .mobile-card-grid{
        display:block;
        position:absolute;
        inset:0;
        z-index:0;
        pointer-events:none;
        overflow:hidden;
      }
      .mobile-card-grid::before,
      .mobile-card-grid::after{
        content:"";
        position:absolute;
        inset:-14%;
      }
      .mobile-card-grid::before{
        background-image:
          linear-gradient(rgba(var(--grid-rgb), .22) 1.1px, transparent 1.1px),
          linear-gradient(90deg, rgba(var(--grid-rgb), .22) 1.1px, transparent 1.1px);
        background-size:42px 42px;
        transform:rotate(-8deg) scale(1.08);
        opacity:.50;
        animation: gridDrift 28s linear infinite;
        filter:
          drop-shadow(0 0 8px rgba(var(--grid-rgb), .12))
          drop-shadow(0 0 16px rgba(var(--grid-rgb), .05));
      }
      .mobile-card-grid::after{
        background:
          radial-gradient(circle at 22% 16%, rgba(var(--grid-rgb), .09), transparent 28%),
          radial-gradient(circle at 78% 84%, rgba(var(--grid-rgb), .06), transparent 34%),
          linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.22));
        opacity:.9;
        filter:blur(12px);
      }
      /* ... rest of mobile styles unchanged ... */
    }
    @media (max-width: 430px){
      .topbar-inner{
        padding:12px 10px;
      }
      .nav{
        gap:8px;
      }
      .nav a{
        padding:9px 12px;
        font-size:.84rem;
      }
      .page-wrap{
        padding:88px 8px 28px;
      }
    }
  </style>
</head>
