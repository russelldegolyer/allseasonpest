<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Season Pest Control</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas" />

  <style>
    :root {
      --bg: #000000;
      --red-main: #ff2a2a;
      --red-line: rgba(255, 42, 42, 0.34);
      --red-line-strong: rgba(255, 42, 42, 0.56);
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 0, 0, 0.08), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.04), transparent 48%),
        #000;
    }

    .bg-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background: #000;
    }

    .bg-grid {
      position: absolute;
      left: 50%;
      top: 56%;
      width: 240vw;
      height: 240vh;
      transform:
        translate(-50%, -50%)
        perspective(1400px)
        rotateX(79deg)
        scale(1.38);
      transform-origin: center center;
      background:
        linear-gradient(var(--red-line) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-line) 2px, transparent 2px);
      background-size: 88px 88px;
      opacity: 0.96;
      filter:
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.14))
        drop-shadow(0 0 18px rgba(255, 0, 0, 0.10));
      animation: gridRise 8.5s linear infinite;
    }

    .bg-grid::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 60, 60, 0.18) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 60, 60, 0.18) 2px, transparent 2px);
      background-size: 88px 88px;
      mix-blend-mode: screen;
      opacity: 0.92;
      animation: gridRiseOverlay 6.5s linear infinite reverse;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0 24%, rgba(0, 0, 0, 0.14) 46%, rgba(0, 0, 0, 0.82) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.24), rgba(0,0,0,0.56));
    }

    .hero {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-20px);
    }

    .logo-link,
    .enter-link {
      text-decoration: none;
      cursor: pointer;
    }

    .logo-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      border-radius: 32px;
      isolation: isolate;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 36px;
      background:
        radial-gradient(circle at center,
          rgba(0, 0, 0, 0.96) 0%,
          rgba(0, 0, 0, 0.92) 36%,
          rgba(0, 0, 0, 0.58) 58%,
          rgba(255, 0, 0, 0.08) 75%,
          transparent 100%);
      filter: blur(12px);
      z-index: 0;
    }

    .logo-shell::after {
      content: "";
      position: absolute;
      inset: -30px;
      border-radius: 50px;
      background:
        linear-gradient(var(--red-line-strong) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-line-strong) 2px, transparent 2px);
      background-size: 52px 52px;
      opacity: 0.42;
      transform:
        perspective(1100px)
        rotateX(74deg)
        scale(1.06);
      filter:
        blur(0.2px)
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.24))
        drop-shadow(0 0 18px rgba(255, 0, 0, 0.14));
      z-index: 0;
      animation: badgeGridRise 5.8s linear infinite;
      pointer-events: none;
    }

    .logo {
      position: relative;
      z-index: 2;
      display: block;
      max-width: 960px;
      width: min(90vw, 960px);
      height: auto;
      max-height: 76vh;
      transform-origin: center center;
      animation: logoFloat 2.8s ease-in-out infinite;
      transition:
        transform 0.28s ease,
        filter 0.28s ease,
        opacity 0.28s ease;
      filter:
        drop-shadow(0 0 10px rgba(0, 0, 0, 0.96))
        drop-shadow(0 0 22px rgba(0, 0, 0, 0.96))
        drop-shadow(0 0 34px rgba(0, 0, 0, 0.84))
        drop-shadow(0 0 14px rgba(255, 0, 0, 0.28))
        drop-shadow(0 0 32px rgba(255, 0, 0, 0.18));
    }

    .logo-link:hover .logo {
      transform: scale(1.055);
      opacity: 1;
      filter:
        drop-shadow(0 0 12px rgba(0, 0, 0, 0.98))
        drop-shadow(0 0 26px rgba(0, 0, 0, 0.98))
        drop-shadow(0 0 42px rgba(0, 0, 0, 0.90))
        drop-shadow(0 0 12px rgba(255, 0, 0, 0.42))
        drop-shadow(0 0 28px rgba(255, 0, 0, 0.28))
        drop-shadow(0 0 46px rgba(255, 0, 0, 0.16));
    }

    .enter-link {
      margin-top: 6px;
      display: inline-block;
    }

    .enter-text {
      color: var(--red-main);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.96;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.16),
        0 0 18px rgba(255, 0, 0, 0.12);
      animation: softFade 2s ease-in-out infinite;
      transition: transform 0.2s ease, opacity 0.2s ease, text-shadow 0.2s ease;
    }

    .enter-link:hover .enter-text {
      transform: scale(1.05);
      opacity: 1;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.28),
        0 0 24px rgba(255, 0, 0, 0.18);
    }

    @keyframes gridRise {
      0% {
        background-position: 0 0, 0 0;
        transform:
          translate(-50%, -50%)
          perspective(1400px)
          rotateX(79deg)
          scale(1.32);
      }
      100% {
        background-position: 0 -88px, 0 -88px;
        transform:
          translate(-50%, -52.5%)
          perspective(1400px)
          rotateX(79deg)
          scale(1.46);
      }
    }

    @keyframes gridRiseOverlay {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 88px, 0 88px;
      }
    }

    @keyframes badgeGridRise {
      0% {
        background-position: 0 0, 0 0;
        transform:
          perspective(1100px)
          rotateX(74deg)
          scale(1.02);
      }
      100% {
        background-position: 0 -52px, 0 -52px;
        transform:
          perspective(1100px)
          rotateX(74deg)
          scale(1.10);
      }
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.022);
      }
    }

    @keyframes softFade {
      0%, 100% {
        opacity: 0.68;
      }
      50% {
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .hero {
        transform: translateY(-10px);
      }

      .logo-shell {
        padding: 18px;
      }

      .logo-shell::after {
        inset: -18px;
        background-size: 44px 44px;
      }

      .logo {
        width: 92vw;
        max-width: none;
        max-height: none;
      }

      .enter-link {
        margin-top: 10px;
      }

      .enter-text {
        font-size: 15px;
        letter-spacing: 2px;
      }

      .bg-grid {
        width: 280vw;
        height: 280vh;
        background-size: 64px 64px;
        animation-duration: 7s;
      }

      .bg-grid::before {
        background-size: 64px 64px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        overflow: auto;
      }

      body {
        min-height: 100dvh;
      }

      .hero {
        padding: 8px 8px 18px;
      }

      .logo-shell {
        padding: 12px;
        border-radius: 24px;
      }

      .logo-shell::before {
        inset: -6px;
      }

      .logo-shell::after {
        inset: -14px;
        opacity: 0.5;
      }

      .bg-grid {
        width: 320vw;
        height: 320vh;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="bg-wrap" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-vignette"></div>
  </div>

  <main class="hero">
    <a href="home.html" class="logo-link" aria-label="Enter Website">
      <div class="logo-shell">
        <img src="updated logo.PNG" alt="All Season Pest Control" class="logo" />
      </div>
    </a>

    <a href="home.html" class="enter-link" aria-label="Enter Site">
      <div class="enter-text">Click here if you hate bugs</div>
    </a>
  </main>
</body>
</html>
