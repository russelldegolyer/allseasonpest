<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>All Season Pest Control</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas" />

  <style>
    :root {
      --bg: #000000;
      --red: #ff2a2a;
      --red-soft: rgba(255, 42, 42, 0.16);
      --red-mid: rgba(255, 42, 42, 0.3);
      --red-grid: rgba(255, 42, 42, 0.24);
      --red-grid-strong: rgba(255, 42, 42, 0.42);
      --white: #ffffff;
      --black-deep: rgba(0, 0, 0, 0.98);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: var(--white);
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(to bottom, #000 0%, #000 34%, #070000 52%, #000 100%);
    }

    .top-fade {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 0, 0, 0.04), transparent 18%),
        linear-gradient(to bottom, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.28) 52%, rgba(0,0,0,0.1) 100%);
      z-index: 1;
    }

    .horizon-glow {
      position: absolute;
      left: 50%;
      top: 49%;
      width: min(1120px, 118vw);
      height: min(450px, 42vh);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(
          ellipse at center,
          rgba(255, 0, 0, 0.34) 0%,
          rgba(190, 0, 0, 0.23) 26%,
          rgba(110, 0, 0, 0.14) 50%,
          rgba(0, 0, 0, 0) 76%
        );
      filter: blur(14px);
      opacity: 0.95;
      z-index: 2;
      animation: glowPulse 4.2s ease-in-out infinite;
    }

    .horizon-band {
      position: absolute;
      left: 50%;
      top: 51.5%;
      width: min(1320px, 160vw);
      height: 2px;
      transform: translateX(-50%);
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 42, 42, 0.1) 10%,
        rgba(255, 42, 42, 0.75) 50%,
        rgba(255, 42, 42, 0.1) 90%,
        transparent 100%
      );
      box-shadow:
        0 0 8px rgba(255, 0, 0, 0.28),
        0 0 18px rgba(255, 0, 0, 0.18);
      z-index: 3;
      opacity: 0.95;
    }

    .floor-grid {
      position: absolute;
      left: 50%;
      top: 67%;
      width: 235vw;
      height: 185vh;
      transform:
        translate(-50%, -50%)
        perspective(1200px)
        rotateX(78deg)
        scale(1.08);
      transform-origin: center center;
      z-index: 2;
      opacity: 0.98;
      background:
        linear-gradient(var(--red-grid) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-grid) 2px, transparent 2px);
      background-size: 86px 86px;
      animation: gridRise 7.4s linear infinite;
      mask-image: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.95) 16%,
        rgba(0,0,0,1) 36%,
        rgba(0,0,0,1) 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.95) 16%,
        rgba(0,0,0,1) 36%,
        rgba(0,0,0,1) 100%
      );
      filter:
        drop-shadow(0 0 5px rgba(255, 0, 0, 0.1))
        drop-shadow(0 0 12px rgba(255, 0, 0, 0.08));
    }

    .floor-grid::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 42, 42, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 42, 42, 0.1) 1px, transparent 1px);
      background-size: 43px 43px;
      mix-blend-mode: screen;
      opacity: 0.55;
      animation: gridRiseFine 5.8s linear infinite reverse;
    }

    .floor-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 0, 0, 0.1), transparent 18%),
        linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.18) 28%, rgba(0,0,0,0.42) 100%);
    }

    .floor-vignette {
      position: absolute;
      inset: 0;
      z-index: 4;
      background:
        radial-gradient(circle at center, transparent 0 24%, rgba(0,0,0,0.1) 46%, rgba(0,0,0,0.72) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.08) 35%, rgba(0,0,0,0.36) 100%);
    }

    .wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(12px);
    }

    .logo-link,
    .enter-link {
      text-decoration: none;
      cursor: pointer;
    }

    .logo-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px 14px;
      isolation: isolate;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(760px, 86vw);
      height: min(500px, 42vh);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.98) 0%,
          rgba(0, 0, 0, 0.96) 38%,
          rgba(0, 0, 0, 0.8) 56%,
          rgba(0, 0, 0, 0.26) 72%,
          rgba(0, 0, 0, 0) 100%
        );
      filter: blur(10px);
      z-index: 0;
    }

    .logo-shell::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 53%;
      width: min(560px, 70vw);
      height: min(190px, 16vh);
      transform:
        translate(-50%, -50%)
        perspective(900px)
        rotateX(72deg)
        scale(1.02);
      border-radius: 50%;
      background:
        linear-gradient(var(--red-grid-strong) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-grid-strong) 2px, transparent 2px);
      background-size: 54px 54px;
      opacity: 0.34;
      filter:
        blur(0.15px)
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.24))
        drop-shadow(0 0 18px rgba(255, 0, 0, 0.14));
      animation: badgeGridMove 5.8s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .logo {
      position: relative;
      z-index: 2;
      display: block;
      width: min(54vw, 580px);
      max-width: 580px;
      min-width: 330px;
      height: auto;
      transform-origin: center center;
      animation: logoFloat 3.1s ease-in-out infinite;
      transition:
        transform 0.28s ease,
        filter 0.28s ease,
        opacity 0.28s ease;
      filter:
        drop-shadow(0 0 14px rgba(0, 0, 0, 1))
        drop-shadow(0 0 26px rgba(0, 0, 0, 0.98))
        drop-shadow(0 0 42px rgba(0, 0, 0, 0.9))
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.18))
        drop-shadow(0 0 20px rgba(255, 0, 0, 0.12));
    }

    .logo-link:hover .logo {
      transform: scale(1.045);
      filter:
        drop-shadow(0 0 16px rgba(0, 0, 0, 1))
        drop-shadow(0 0 30px rgba(0, 0, 0, 1))
        drop-shadow(0 0 48px rgba(0, 0, 0, 0.92))
        drop-shadow(0 0 10px rgba(255, 0, 0, 0.24))
        drop-shadow(0 0 24px rgba(255, 0, 0, 0.14));
    }

    .enter-link {
      display: inline-block;
      margin-top: 6px;
    }

    .enter-text {
      color: var(--red);
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.97;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.14),
        0 0 18px rgba(255, 0, 0, 0.1);
      animation: softFade 2.2s ease-in-out infinite;
      transition: transform 0.2s ease, opacity 0.2s ease, text-shadow 0.2s ease;
    }

    .enter-link:hover .enter-text {
      transform: scale(1.04);
      opacity: 1;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.22),
        0 0 24px rgba(255, 0, 0, 0.14);
    }

    @keyframes gridRise {
      0% {
        background-position: 0 0, 0 0;
        transform:
          translate(-50%, -50%)
          perspective(1200px)
          rotateX(78deg)
          scale(1.03);
      }
      100% {
        background-position: 0 -86px, 0 -86px;
        transform:
          translate(-50%, -52.4%)
          perspective(1200px)
          rotateX(78deg)
          scale(1.15);
      }
    }

    @keyframes gridRiseFine {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 43px, 0 43px;
      }
    }

    @keyframes badgeGridMove {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 -54px, 0 -54px;
      }
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.018);
      }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.86;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.03);
      }
    }

    @keyframes softFade {
      0%, 100% {
        opacity: 0.72;
      }
      50% {
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .horizon-glow {
        top: 49.5%;
        width: 125vw;
        height: 34vh;
      }

      .horizon-band {
        top: 52%;
      }

      .floor-grid {
        top: 69%;
        width: 280vw;
        height: 210vh;
        background-size: 70px 70px;
        animation-duration: 6.8s;
      }

      .floor-grid::before {
        background-size: 35px 35px;
      }

      .hero {
        transform: translateY(20px);
      }

      .logo {
        width: min(72vw, 500px);
        min-width: 0;
      }

      .logo-shell::before {
        width: min(640px, 92vw);
        height: min(420px, 34vh);
      }

      .logo-shell::after {
        width: min(500px, 82vw);
      }

      .enter-link {
        margin-top: 0;
      }

      .enter-text {
        font-size: 17px;
        letter-spacing: 4px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        overflow: auto;
      }

      body {
        min-height: 100dvh;
      }

      .wrap {
        padding: 0 8px;
      }

      .hero {
        transform: translateY(26px);
      }

      .horizon-glow {
        top: 48.8%;
        width: 148vw;
        height: 28vh;
        filter: blur(12px);
      }

      .horizon-band {
        top: 51.5%;
        width: 170vw;
      }

      .floor-grid {
        top: 70.5%;
        width: 335vw;
        height: 235vh;
        background-size: 56px 56px;
        transform:
          translate(-50%, -50%)
          perspective(920px)
          rotateX(79deg)
          scale(1.14);
        animation-duration: 6.2s;
      }

      .floor-grid::before {
        background-size: 28px 28px;
        opacity: 0.62;
      }

      .logo-shell {
        padding: 8px 8px 6px;
      }

      .logo-shell::before {
        width: 92vw;
        height: 26vh;
        filter: blur(8px);
      }

      .logo-shell::after {
        width: 78vw;
        height: 12vh;
        top: 55%;
        background-size: 42px 42px;
        opacity: 0.28;
      }

      .logo {
        width: 72vw;
        max-width: none;
      }

      .enter-link {
        margin-top: 8px;
      }

      .enter-text {
        font-size: 14px;
        letter-spacing: 3.2px;
      }
    }

    @media (max-width: 480px) {
      .hero {
        transform: translateY(34px);
      }

      .horizon-glow {
        top: 48.6%;
        width: 160vw;
        height: 26vh;
      }

      .horizon-band {
        top: 51.2%;
      }

      .floor-grid {
        top: 72%;
        width: 360vw;
        height: 250vh;
        background-size: 50px 50px;
      }

      .floor-grid::before {
        background-size: 25px 25px;
      }

      .logo {
        width: 74vw;
      }

      .enter-text {
        font-size: 12px;
        letter-spacing: 2.8px;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="top-fade"></div>
    <div class="horizon-glow"></div>
    <div class="horizon-band"></div>
    <div class="floor-grid"></div>
    <div class="floor-vignette"></div>
  </div>

  <div class="wrap">
    <div class="hero">
      <a href="home.html" class="logo-link" aria-label="Enter Website">
        <div class="logo-shell">
          <img src="updated logo.PNG" alt="All Season Pest Control" class="logo" />
        </div>
      </a>

      <a href="home.html" class="enter-link" aria-label="Enter Site">
        <div class="enter-text">Click here if you hate bugs</div>
      </a>
    </div>
  </div>
</body>
</html>
