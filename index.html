<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Season Pest Control</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas" />

  <style>
    :root {
      --bg: #000000;
      --red-main: #ff2a2a;
      --red-soft: rgba(255, 42, 42, 0.18);
      --red-line: rgba(255, 42, 42, 0.34);
      --red-line-strong: rgba(255, 42, 42, 0.52);
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 0, 0, 0.08), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.04), transparent 48%),
        #000;
    }

    .bg-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background: #000;
    }

    .bg-grid {
      position: absolute;
      inset: -22%;
      background:
        linear-gradient(var(--red-line) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-line) 2px, transparent 2px);
      background-size: 90px 90px;
      transform: perspective(1200px) rotateX(72deg) scale(1.45);
      transform-origin: center center;
      opacity: 0.95;
      filter:
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.12))
        drop-shadow(0 0 18px rgba(255, 0, 0, 0.10));
      animation: gridDrift 11s linear infinite;
    }

    .bg-grid::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 55, 55, 0.18) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 55, 55, 0.18) 2px, transparent 2px);
      background-size: 90px 90px;
      opacity: 0.9;
      mix-blend-mode: screen;
      animation: gridShift 8s linear infinite reverse;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0 28%, rgba(0, 0, 0, 0.14) 48%, rgba(0, 0, 0, 0.8) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.28), rgba(0,0,0,0.52));
    }

    .hero {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-20px);
    }

    .logo-link,
    .enter-link {
      text-decoration: none;
      cursor: pointer;
    }

    .logo-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      border-radius: 32px;
      isolation: isolate;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 36px;
      background:
        radial-gradient(circle at center,
          rgba(0, 0, 0, 0.94) 0%,
          rgba(0, 0, 0, 0.88) 36%,
          rgba(0, 0, 0, 0.55) 56%,
          rgba(255, 0, 0, 0.08) 72%,
          transparent 100%);
      filter: blur(12px);
      z-index: 0;
    }

    .logo-shell::after {
      content: "";
      position: absolute;
      inset: -28px;
      border-radius: 50px;
      background:
        linear-gradient(var(--red-line-strong) 2px, transparent 2px),
        linear-gradient(90deg, var(--red-line-strong) 2px, transparent 2px);
      background-size: 54px 54px;
      opacity: 0.42;
      transform: perspective(1000px) rotateX(62deg) scale(1.05);
      filter:
        blur(0.2px)
        drop-shadow(0 0 8px rgba(255, 0, 0, 0.24))
        drop-shadow(0 0 18px rgba(255, 0, 0, 0.14));
      z-index: 0;
      animation: badgeGridMove 6.5s linear infinite;
      pointer-events: none;
    }

    .logo {
      position: relative;
      z-index: 2;
      display: block;
      max-width: 960px;
      width: min(90vw, 960px);
      height: auto;
      max-height: 76vh;
      transform-origin: center center;
      animation: logoFloat 2.8s ease-in-out infinite;
      transition:
        transform 0.28s ease,
        filter 0.28s ease,
        opacity 0.28s ease;
      filter:
        drop-shadow(0 0 10px rgba(0, 0, 0, 0.95))
        drop-shadow(0 0 22px rgba(0, 0, 0, 0.95))
        drop-shadow(0 0 34px rgba(0, 0, 0, 0.82))
        drop-shadow(0 0 14px rgba(255, 0, 0, 0.28))
        drop-shadow(0 0 32px rgba(255, 0, 0, 0.18));
    }

    .logo-link:hover .logo {
      transform: scale(1.055);
      opacity: 1;
      filter:
        drop-shadow(0 0 12px rgba(0, 0, 0, 0.98))
        drop-shadow(0 0 26px rgba(0, 0, 0, 0.98))
        drop-shadow(0 0 42px rgba(0, 0, 0, 0.9))
        drop-shadow(0 0 12px rgba(255, 0, 0, 0.42))
        drop-shadow(0 0 28px rgba(255, 0, 0, 0.28))
        drop-shadow(0 0 46px rgba(255, 0, 0, 0.16));
    }

    .enter-link {
      margin-top: 6px;
      display: inline-block;
    }

    .enter-text {
      color: var(--red-main);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.96;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.16),
        0 0 18px rgba(255, 0, 0, 0.12);
      animation: softFade 2s ease-in-out infinite;
      transition: transform 0.2s ease, opacity 0.2s ease, text-shadow 0.2s ease;
    }

    .enter-link:hover .enter-text {
      transform: scale(1.05);
      opacity: 1;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.28),
        0 0 24px rgba(255, 0, 0, 0.18);
    }

    @keyframes gridDrift {
      0% {
        transform: perspective(1200px) rotateX(72deg) scale(1.45) translate3d(0, 0, 0);
      }
      100% {
        transform: perspective(1200px) rotateX(72deg) scale(1.45) translate3d(-90px, -90px, 0);
      }
    }

    @keyframes gridShift {
      0% {
        transform: translate3d(0, 0, 0);
      }
      100% {
        transform: translate3d(90px, 90px, 0);
      }
    }

    @keyframes badgeGridMove {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: -54px -54px, -54px -54px;
      }
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.022);
      }
    }

    @keyframes softFade {
      0%, 100% {
        opacity: 0.68;
      }
      50% {
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .hero {
        transform: translateY(-10px);
      }

      .logo-shell {
        padding: 18px;
      }

      .logo-shell::after {
        inset: -18px;
        background-size: 44px 44px;
      }

      .logo {
        width: 92vw;
        max-width: none;
        max-height: none;
      }

      .enter-link {
        margin-top: 10px;
      }

      .enter-text {
        font-size: 15px;
        letter-spacing: 2px;
      }

      .bg-grid {
        inset: -34%;
        background-size: 62px 62px;
        transform: perspective(900px) rotateX(75deg) scale(1.65);
        animation-duration: 8s;
      }

      .bg-grid::before {
        background-size: 62px 62px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        overflow: auto;
      }

      body {
        min-height: 100dvh;
      }

      .hero {
        padding: 8px 8px 18px;
      }

      .logo-shell {
        padding: 12px;
        border-radius: 24px;
      }

      .logo-shell::before {
        inset: -6px;
      }

      .logo-shell::after {
        inset: -14px;
        opacity: 0.5;
      }

      .bg-grid {
        inset: -42%;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="bg-wrap" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-vignette"></div>
  </div>

  <main class="hero">
    <a href="home.html" class="logo-link" aria-label="Enter Website">
      <div class="logo-shell">
        <img src="updated logo.PNG" alt="All Season Pest Control" class="logo" />
      </div>
    </a>

    <a href="home.html" class="enter-link" aria-label="Enter Site">
      <div class="enter-text">Click here if you hate bugs</div>
    </a>
  </main>
</body>
</html>
