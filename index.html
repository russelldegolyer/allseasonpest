<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>All Season Pest Control - Jonesboro, Arkansas</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --text:#ffffff;
      --red:#ff2a2a;
    }

    *{ box-sizing:border-box; margin:0; padding:0; min-width:0; }

    html, body{
      width:100%;
      min-height:100%;
      background:#000;
      overflow:hidden;
    }

    body{
      color:var(--text);
      font-family:"Sora", Arial, sans-serif;
    }

    a{ color:inherit; text-decoration:none; -webkit-tap-highlight-color: transparent; }

    .stage{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      isolation:isolate;
    }

    .stage::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,.05) 60%, rgba(0,0,0,.15) 100%),
        linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.07));
    }

    .web-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      display:block;
      pointer-events:none;
      filter: drop-shadow(0 0 6px rgba(255,80,80,.15));
    }

    .content{
      position:relative;
      z-index:3;
      width:100%;
      max-width:1200px;
      padding:24px 20px 18px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      transform:translateY(-18px);
    }

    .logo-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      position:relative;
      line-height:0;
    }

    .logo{
      position:relative;
      z-index:1;
      max-width:950px;
      width:auto;
      height:auto;
      max-height:78vh;
      transform-origin:center center;
      transition: transform .35s cubic-bezier(0.23,1,0.32,1), filter .35s ease;
      animation: subtlePulse 2.8s ease-in-out infinite;
    }

    .logo-link:hover .logo{
      transform:scale(1.06);
      filter: drop-shadow(0 0 12px rgba(255,42,42,.25));
      animation-play-state:paused;
    }

    .enter-link{
      display:inline-block;
      margin-top:6px;
    }

    .enter-text{
      color:#ff2a2a;
      font-family:"Oswald", Arial, sans-serif;
      font-size:18px;
      font-weight:600;
      letter-spacing:4.5px;
      text-transform:uppercase;
      opacity:.95;
      animation: softFade 2.2s ease-in-out infinite;
      text-shadow: 0 0 10px rgba(255,42,42,.15);
    }

    .enter-link:hover .enter-text{
      opacity:1;
      transform:scale(1.05);
    }

    @keyframes subtlePulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.028); }
    }

    @keyframes softFade{
      0%,100%{ opacity:.72; }
      50%{ opacity:1; }
    }

    @media (max-width: 768px){
      body{ overflow:auto; }
      .content{ padding:12px 10px 20px; }
      .hero{ transform:translateY(-8px); }
      .logo{ width:92vw; max-height:none; }
      .enter-text{ font-size:15.5px; letter-spacing:2.5px; }
    }

    /* Reduced motion fallback */
    @media (prefers-reduced-motion: reduce){
      .logo, .enter-text{ animation: none !important; }
      .web-canvas{ filter: none; }
    }
  </style>
</head>
<body>
  <main class="stage" id="indexStage" aria-label="All Season Pest Control animated spider web background">
    <canvas class="web-canvas" id="webCanvas" aria-hidden="true"></canvas>

    <div class="content">
      <div class="hero">
        <a href="home.html" class="logo-link" aria-label="Enter All Season Pest Control website">
          <img src="updated logo.PNG" alt="All Season Pest Control Logo" class="logo">
        </a>

        <a href="home.html" class="enter-link" aria-label="Enter the website - Click here if you hate bugs">
          <div class="enter-text">Click here if you hate bugs</div>
        </a>
      </div>
    </div>
  </main>

  <script>
    const stage = document.getElementById("indexStage");
    const canvas = document.getElementById("webCanvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let w = 0, h = 0, dpr = 1;
    let tick = 0;
    let mouseX = 0, mouseY = 0;

    let webs = [];
    let crossThreads = [];
    let microThreads = [];
    let overlapWeave = [];

    let scrollTarget = 0;
    let scrollEase = 0;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function dist(ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function resizeCanvas() {
      const rect = stage.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildScene();
    }

    // Debounced resize
    let resizeTimeout;
    function debouncedResize() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(resizeCanvas, 80);
    }

    function buildWeb(cx, cy, radius, theme = "red", layer = "mid", custom = {}) {
      const mobile = w < 768;
      const spokeCount = custom.spokeCount ?? (layer === "back" ? (mobile ? 8 : 10) : layer === "front" ? (mobile ? 9 : 11) : (mobile ? 9 : 10));
      const ringCount = custom.ringCount ?? (layer === "back" ? (mobile ? 7 : 9) : layer === "front" ? (mobile ? 9 : 12) : (mobile ? 8 : 11));

      const spokes = [];
      let angle = rand(0, Math.PI * 2);

      for (let i = 0; i < spokeCount; i++) {
        angle += (Math.PI * 2 / spokeCount) + rand(-0.18, 0.18);
        const shouldShorten = Math.random() < 0.55;

        spokes.push({
          angle,
          reach: radius * (shouldShorten ? rand(0.42, 0.65) : rand(0.65, 0.86)),
          thickness: theme === "red" 
            ? (layer === "front" ? rand(1.15, 1.95) : layer === "back" ? rand(0.68, 1.05) : rand(0.95, 1.45))
            : (layer === "front" ? rand(0.95, 1.55) : layer === "back" ? rand(0.58, 0.92) : rand(0.75, 1.15)),
          alpha: theme === "red" 
            ? (layer === "front" ? rand(0.24, 0.38) : layer === "back" ? rand(0.07, 0.13) : rand(0.14, 0.24))
            : (layer === "front" ? rand(0.11, 0.19) : layer === "back" ? rand(0.035, 0.07) : rand(0.07, 0.14)),
          curve: rand(-52, 52),
          wobble: layer === "back" ? rand(0.9, 2.1) : layer === "front" ? rand(1.2, 3.8) : rand(1.1, 3.2),
          phase: rand(0, Math.PI * 2),
          breakStart: Math.random() < 0.25 ? rand(0.28, 0.70) : null,
          breakLen: rand(0.04, 0.22),
          fadeEarly: Math.random() < 0.48 ? rand(0.38, 0.75) : null
        });
      }

      const rings = [];
      let ratio = 0.17;
      for (let i = 0; i < ringCount; i++) {
        ratio += rand(0.058, 0.095);
        rings.push({
          ratio,
          thickness: layer === "front" ? rand(0.95, 1.52) : layer === "back" ? rand(0.52, 0.82) : rand(0.78, 1.12),
          alpha: theme === "red" 
            ? (layer === "front" ? rand(0.13, 0.22) : layer === "back" ? rand(0.035, 0.06) : rand(0.08, 0.14))
            : (layer === "front" ? rand(0.07, 0.13) : layer === "back" ? rand(0.022, 0.04) : rand(0.045, 0.09)),
          sag: rand(-16, 19),
          jitter: layer === "back" ? rand(0.6, 1.1) : layer === "front" ? rand(0.8, 1.9) : rand(0.8, 1.6),
          partialStart: rand(0.05, 0.19),
          partialEnd: rand(0.81, 0.98),
          dropout: rand(0.07, 0.19)
        });
      }

      return {
        cx, cy, radius,
        theme, layer, spokes, rings,
        glow: theme === "red" ? "255,80,80" : "255,255,255",
        motion: layer === "back" ? rand(0.0009, 0.0015) : layer === "front" ? rand(0.0016, 0.0024) : rand(0.0012, 0.0019),
        scrollFactor: layer === "back" ? rand(0.11, 0.19) : layer === "front" ? rand(0.24, 0.34) : rand(0.17, 0.25)
      };
    }

    function buildScene() {
      webs = [];
      crossThreads = [];
      microThreads = [];
      overlapWeave = [];

      const mobile = w < 768;

      const redMain = { x: w * (mobile ? 0.13 : 0.145), y: h * (mobile ? 0.47 : 0.445), r: Math.max(w, h) * (mobile ? 0.63 : 0.67) };
      const whiteMain = { x: w * 0.89, y: h * (mobile ? 0.69 : 0.71), r: Math.max(w, h) * (mobile ? 0.51 : 0.57) };
      const whiteTop = { x: w * (mobile ? 0.57 : 0.55), y: h * 0.09, r: Math.max(w, h) * (mobile ? 0.29 : 0.33) };

      webs.push(
        buildWeb(redMain.x, redMain.y, redMain.r * 1.03, "red", "back"),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r * 1.01, "white", "back", { spokeCount: mobile ? 7 : 8 }),

        buildWeb(redMain.x, redMain.y, redMain.r, "red", "mid", { spokeCount: mobile ? 9 : 10 }),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r, "white", "mid", { spokeCount: mobile ? 7 : 8 }),
        buildWeb(whiteTop.x, whiteTop.y, whiteTop.r, "white", "mid", { spokeCount: mobile ? 7 : 8 }),

        buildWeb(redMain.x, redMain.y, redMain.r * 0.97, "red", "front", { spokeCount: mobile ? 9 : 11 }),
        buildWeb(whiteMain.x, whiteMain.y, whiteMain.r * 0.94, "white", "front", { spokeCount: mobile ? 7 : 8 })
      );

      const mainA = webs[2];
      const mainB = webs[3];

      // Fewer cross threads for better perf
      for (let i = 0; i < (mobile ? 10 : 14); i++) {
        crossThreads.push({
          aWeb: mainA, bWeb: mainB,
          aSpoke: i % mainA.spokes.length,
          bSpoke: (i * 2 + 3) % mainB.spokes.length,
          ta: rand(0.25, 0.71), tb: rand(0.23, 0.67),
          bend: rand(-11, 11),
          alpha: rand(0.019, 0.037),
          width: rand(0.5, 0.85),
          phase: rand(0, Math.PI * 2)
        });
      }

      const microCount = mobile ? 110 : 165;   // reduced for performance
      for (let i = 0; i < microCount; i++) {
        const wa = webs[Math.floor(rand(0, webs.length))];
        const wb = webs[Math.floor(rand(0, webs.length))];
        microThreads.push({
          wa, wb,
          sa: Math.floor(rand(0, wa.spokes.length)),
          sb: Math.floor(rand(0, wb.spokes.length)),
          ta: rand(0.2, 0.88), tb: rand(0.2, 0.88),
          bend: rand(-6.5, 6.5),
          alpha: rand(0.011, 0.027),
          width: rand(0.28, 0.52),
          phase: rand(0, Math.PI * 2)
        });
      }

      const overlapCount = mobile ? 45 : 75;   // reduced
      for (let i = 0; i < overlapCount; i++) {
        overlapWeave.push({
          x1: rand(w * 0.22, w * 0.78),
          y1: rand(h * 0.18, h * 0.84),
          x2: rand(w * 0.26, w * 0.86),
          y2: rand(h * 0.24, h * 0.90),
          alpha: rand(0.013, 0.035),
          width: rand(0.32, 0.59),
          bend: rand(-9, 9),
          phase: rand(0, Math.PI * 2)
        });
      }
    }

    function getMixedColor(x, y, alphaBase) {
      const redSource = webs.find(w => w.theme === "red" && w.layer === "mid");
      const whiteSource = webs.find(w => w.theme === "white" && w.layer === "mid");

      const dRed = dist(x, y, redSource.cx, redSource.cy);
      const dWhite = dist(x, y, whiteSource.cx, whiteSource.cy);

      const redInf = clamp(1 - dRed / redSource.radius, 0, 1);
      const whiteInf = clamp(1 - dWhite / whiteSource.radius, 0, 1);

      const total = Math.max(0.0001, redInf + whiteInf);
      const mix = whiteInf / total;

      const r = 255;
      const g = lerp(72, 255, mix);
      const b = lerp(72, 255, mix);
      const a = alphaBase * (0.93 + Math.max(redInf, whiteInf) * 0.36);

      return `rgba(${r},${g.toFixed(0)},${b.toFixed(0)},${a.toFixed(3)})`;
    }

    function pointOnSpoke(web, spoke, p, extraSag = 0) {
      const baseR = spoke.reach * p;
      const normalX = Math.cos(spoke.angle + Math.PI / 2);
      const normalY = Math.sin(spoke.angle + Math.PI / 2);

      const motionBlend = tick * web.motion + scrollEase * web.scrollFactor + (mouseX * 0.0008 + mouseY * 0.0006);

      const wiggle = Math.sin(motionBlend + spoke.phase + p * 2.2) * spoke.wobble * (0.17 + p * 0.17);
      const curve = Math.sin((p * Math.PI * 0.83) + spoke.phase * 0.3 + motionBlend * 0.52) * spoke.curve * (0.35 + p * 0.48);

      return {
        x: web.cx + Math.cos(spoke.angle) * baseR + normalX * (wiggle + curve * 0.37),
        y: web.cy + Math.sin(spoke.angle) * baseR + normalY * (wiggle + extraSag + curve * 0.37)
      };
    }

    function isBroken(spoke, p) {
      return spoke.breakStart !== null && p >= spoke.breakStart && p <= (spoke.breakStart + spoke.breakLen);
    }

    function drawGlow(web) {
      const g = ctx.createRadialGradient(web.cx, web.cy, 0, web.cx, web.cy, web.radius * 1.04);
      const baseA = web.theme === "red" 
        ? (web.layer === "front" ? 0.048 : web.layer === "mid" ? 0.028 : 0.015)
        : (web.layer === "front" ? 0.022 : web.layer === "mid" ? 0.013 : 0.008);

      g.addColorStop(0, `rgba(${web.glow},${baseA})`);
      g.addColorStop(0.22, `rgba(${web.glow},${baseA * 0.36})`);
      g.addColorStop(0.52, `rgba(${web.glow},${baseA * 0.09})`);
      g.addColorStop(1, `rgba(${web.glow},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSpokes(web) {
      web.spokes.forEach(spoke => {
        ctx.beginPath();
        let started = false;
        let prev = null;
        const steps = 28; // slightly reduced

        for (let i = 0; i <= steps; i++) {
          const p = i / steps;
          if (spoke.fadeEarly !== null && p > spoke.fadeEarly) break;
          if (isBroken(spoke, p)) { started = false; prev = null; continue; }

          const pt = pointOnSpoke(web, spoke, p);

          if (!started) {
            ctx.moveTo(pt.x, pt.y);
            started = true;
          } else if (prev) {
            const mx = (prev.x + pt.x) * 0.5;
            const my = (prev.y + pt.y) * 0.5;
            ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
          }
          prev = pt;
        }

        const sample = pointOnSpoke(web, spoke, 0.5);
        ctx.strokeStyle = getMixedColor(sample.x, sample.y, spoke.alpha);
        ctx.lineWidth = spoke.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    function drawRings(web) {
      const sorted = [...web.spokes].sort((a, b) => a.angle - b.angle);

      web.rings.forEach((ring, ringIndex) => {
        const points = [];
        sorted.forEach((spoke, i) => {
          const p = ring.ratio;
          if (p < ring.partialStart || p > ring.partialEnd) return;
          if (Math.random() < ring.dropout * 0.055) return;
          if (isBroken(spoke, p)) return;

          const pt = pointOnSpoke(web, spoke, p,
            Math.sin(tick * web.motion * 0.72 + scrollEase * 0.11 + i + ringIndex) * ring.jitter + ring.sag * 0.1
          );
          points.push(pt);
        });

        if (points.length < 4) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const mx = (points[i].x + points[i + 1].x) * 0.5;
          const my = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
        }
        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

        const cp = points[Math.floor(points.length / 2)];
        ctx.strokeStyle = getMixedColor(cp.x, cp.y, ring.alpha);
        ctx.lineWidth = ring.thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
    }

    // The rest of the drawing functions (drawCrossThreads, drawMicroThreads, drawOverlapWeave, drawCoreDim) remain very similar — I kept them efficient.

    function drawCrossThreads() {
      crossThreads.forEach(thread => {
        const spokeA = thread.aWeb.spokes[thread.aSpoke];
        const spokeB = thread.bWeb.spokes[thread.bSpoke];
        if (isBroken(spokeA, thread.ta) || isBroken(spokeB, thread.tb)) return;

        const p1 = pointOnSpoke(thread.aWeb, spokeA, thread.ta);
        const p2 = pointOnSpoke(thread.bWeb, spokeB, thread.tb);

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(tick * 0.0019 + scrollEase * 0.09 + thread.phase) * thread.bend;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(tick * 0.0019 + scrollEase * 0.09 + thread.phase) * (thread.bend * 0.66);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawMicroThreads() {
      microThreads.forEach(thread => {
        const spokeA = thread.wa.spokes[thread.sa];
        const spokeB = thread.wb.spokes[thread.sb];
        if (!spokeA || !spokeB || isBroken(spokeA, thread.ta) || isBroken(spokeB, thread.tb)) return;

        const p1 = pointOnSpoke(thread.wa, spokeA, thread.ta);
        const p2 = pointOnSpoke(thread.wb, spokeB, thread.tb);
        if (dist(p1.x, p1.y, p2.x, p2.y) > Math.min(w, h) * 0.23) return;

        const mx = (p1.x + p2.x) * 0.5 + Math.sin(tick * 0.0015 + scrollEase * 0.07 + thread.phase) * thread.bend;
        const my = (p1.y + p2.y) * 0.5 + Math.cos(tick * 0.0015 + scrollEase * 0.07 + thread.phase) * (thread.bend * 0.66);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.quadraticCurveTo(mx, my, p2.x, p2.y);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawOverlapWeave() {
      overlapWeave.forEach(thread => {
        const x1 = thread.x1 + Math.sin(tick * 0.0013 + scrollEase * 0.06 + thread.phase) * 2.8;
        const y1 = thread.y1 + Math.cos(tick * 0.0012 + scrollEase * 0.06 + thread.phase) * 2.8;
        const x2 = thread.x2 + Math.cos(tick * 0.0012 + scrollEase * 0.06 + thread.phase) * 2.8;
        const y2 = thread.y2 + Math.sin(tick * 0.0014 + scrollEase * 0.06 + thread.phase) * 2.8;

        const mx = (x1 + x2) * 0.5 + Math.sin(tick * 0.0013 + scrollEase * 0.06 + thread.phase) * thread.bend;
        const my = (y1 + y2) * 0.5 + Math.cos(tick * 0.0012 + scrollEase * 0.06 + thread.phase) * (thread.bend * 0.72);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(mx, my, x2, y2);
        ctx.strokeStyle = getMixedColor(mx, my, thread.alpha);
        ctx.lineWidth = thread.width;
        ctx.stroke();
      });
    }

    function drawCoreDim(web) {
      ctx.beginPath();
      ctx.arc(web.cx, web.cy, web.layer === "front" ? 1.6 : 1.2, 0, Math.PI * 2);
      ctx.fillStyle = getMixedColor(web.cx, web.cy, web.theme === "red" ? 0.12 : 0.09);
      ctx.fill();
    }

    function updateScrollInfluence() {
      scrollEase += (scrollTarget - scrollEase) * 0.065;
      scrollTarget *= 0.935;
    }

    function render() {
      ctx.clearRect(0, 0, w, h);
      if (prefersReducedMotion) {
        tick += 0.25; // very slow motion
      } else {
        tick += 1;
      }

      updateScrollInfluence();

      webs.forEach(drawGlow);

      webs.filter(w => w.layer === "back").forEach(drawRings);
      webs.filter(w => w.layer === "back").forEach(drawSpokes);

      drawMicroThreads();
      webs.filter(w => w.layer === "mid").forEach(drawRings);
      webs.filter(w => w.layer === "mid").forEach(drawSpokes);

      drawCrossThreads();
      drawOverlapWeave();

      webs.filter(w => w.layer === "front").forEach(drawRings);
      webs.filter(w => w.layer === "front").forEach(drawSpokes);

      webs.filter(w => w.layer !== "back").forEach(drawCoreDim);

      requestAnimationFrame(render);
    }

    function handleScroll(e) {
      const delta = window.scrollY - (window.lastScrollY || 0);
      window.lastScrollY = window.scrollY;
      scrollTarget += delta * 0.028;
      scrollTarget = clamp(scrollTarget, -7, 7);
    }

    // Mouse influence for extra life (very light)
    function handleMouse(e) {
      mouseX = (e.clientX - w * 0.5) * 0.6;
      mouseY = (e.clientY - h * 0.5) * 0.6;
    }

    window.addEventListener("scroll", handleScroll, { passive: true });
    window.addEventListener("resize", debouncedResize, { passive: true });
    window.addEventListener("mousemove", handleMouse, { passive: true });

    // Initial setup
    resizeCanvas();
    render();

    // Reduced motion listener
    window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => {
      // Rebuild if needed or just let the flag handle it
      console.log('Reduced motion preference changed');
    });
