<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Season Pest Control</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas">

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
      text-align: center;
    }

    .logo-link {
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
      line-height: 0;
    }

    .logo {
      display: block;
      margin: 0 auto;
      max-width: 950px;
      width: 92%;
      height: auto;
      transition: transform 0.28s ease-in-out, opacity 0.28s ease-in-out;
      transform-origin: center center;
    }

    .logo-link:hover .logo {
      transform: scale(1.045);
      opacity: 0.97;
    }

    .enter-text {
      margin-top: 18px;
      color: #ffffff;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .desktop-text {
      display: inline;
    }

    .mobile-text {
      display: none;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 10px;
      }

      .logo {
        width: 100%;
        max-width: none;
      }

      .enter-text {
        font-size: 14px;
        letter-spacing: 1.5px;
        margin-top: 14px;
      }

      .desktop-text {
        display: none;
      }

      .mobile-text {
        display: inline;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="home.html" class="logo-link" aria-label="Enter Website">
      <img src="updated logo.PNG" alt="All Season Pest Control" class="logo">
    </a>

    <div class="enter-text">
      <span class="desktop-text">Click Logo to Enter</span>
      <span class="mobile-text">Tap Logo to Enter</span>
    </div>
  </div>
</body>
</html>
