<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Season Pest Control</title>
  <meta name="description" content="All Season Pest Control - Jonesboro, Arkansas">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      padding: 30px 20px;
    }

    .logo {
      display: block;
      margin: 0 auto 30px auto;
      max-width: 1100px;
      width: 95%;
      height: auto;
    }

    .enter-btn {
      display: inline-block;
      padding: 16px 34px;
      border: 2px solid #ff0000;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 6px;
      transition: 0.2s ease;
    }

    .enter-btn:hover {
      background: #ff0000;
      color: #fff;
    }

    @media (max-width: 768px) {
      .logo {
        width: 100%;
        max-width: 900px;
      }

      .enter-btn {
        font-size: 16px;
        padding: 14px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="All Season Pest Control" class="logo">
    <a href="home.html" class="enter-btn">Enter Website</a>
  </div>
</body>
</html>
