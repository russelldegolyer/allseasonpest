<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Season Pest Control | Jonesboro, Arkansas</title>
  <meta
    name="description"
    content="All Season Pest Control serving Jonesboro and Northeast Arkansas with dependable pest control for homes."
  />
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 22px 28px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
      flex-wrap: wrap;
    }

    .nav a {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      opacity: 0.96;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav a:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 88px);
      display: flex;
      align-items: center;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.78) 0%,
          rgba(0, 0, 0, 0.58) 36%,
          rgba(0, 0, 0, 0.34) 58%,
          rgba(0, 0, 0, 0.28) 100%
        ),
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.12) 32%,
          rgba(0, 0, 0, 0.38) 100%
        ),
        url("stadium.jpg") center center / cover no-repeat;
    }

    .hero-inner {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 56px 72px;
    }

    .location-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 36px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(20, 20, 20, 0.36);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0;
      max-width: 900px;
      font-size: clamp(3.8rem, 7.2vw, 6.8rem);
      line-height: 0.94;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #fff;
      text-shadow:
        0 3px 14px rgba(0, 0, 0, 0.34),
        0 1px 3px rgba(0, 0, 0, 0.22);
    }

    .hero-sub {
      margin-top: 26px;
      max-width: 860px;
      font-size: clamp(1.15rem, 1.8vw, 1.95rem);
      line-height: 1.3;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 156px;
      padding: 15px 22px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .hero-btn.primary {
      background: #b31317;
      color: #fff;
      border: 2px solid #b31317;
    }

    .hero-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(6px);
    }

    .hero-btn:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    @media (max-width: 980px) {
      .nav {
        gap: 34px;
      }

      .hero {
        min-height: calc(100vh - 82px);
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.54) 0%,
            rgba(0, 0, 0, 0.38) 28%,
            rgba(0, 0, 0, 0.52) 100%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.72) 0%,
            rgba(0, 0, 0, 0.34) 52%,
            rgba(0, 0, 0, 0.22) 100%
          ),
          url("stadium.jpg") center center / cover no-repeat;
      }

      .hero-inner {
        padding: 38px 30px 58px;
      }

      .hero h1 {
        max-width: 760px;
        font-size: clamp(3.2rem, 8vw, 5.4rem);
      }

      .hero-sub {
        max-width: 720px;
      }
    }

    @media (max-width: 768px) {
      .nav-wrap {
        padding: 18px 16px;
      }

      .nav {
        width: 100%;
        gap: 22px;
        justify-content: space-between;
      }

      .nav a {
        font-size: 0.98rem;
      }

      .hero {
        min-height: calc(100vh - 74px);
        align-items: flex-start;
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.56) 0%,
            rgba(0, 0, 0, 0.35) 24%,
            rgba(0, 0, 0, 0.58) 100%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.8) 0%,
            rgba(0, 0, 0, 0.38) 58%,
            rgba(0, 0, 0, 0.2) 100%
          ),
          url("stadium.jpg") 58% center / cover no-repeat;
      }

      .hero-inner {
        padding: 26px 18px 44px;
      }

      .location-pill {
        padding: 13px 22px;
        font-size: 0.86rem;
        margin-bottom: 18px;
      }

      .hero h1 {
        max-width: 100%;
        font-size: clamp(2.85rem, 11vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.065em;
      }

      .hero-sub {
        margin-top: 18px;
        font-size: 1rem;
        line-height: 1.35;
        max-width: 100%;
      }

      .hero-actions {
        margin-top: 24px;
        gap: 10px;
      }

      .hero-btn {
        flex: 1 1 100%;
        min-width: 0;
        padding: 14px 18px;
      }
    }

    @media (max-width: 480px) {
      .nav {
        gap: 14px;
      }

      .nav a {
        font-size: 0.9rem;
      }

      .hero-inner {
        padding: 22px 14px 38px;
      }

      .location-pill {
        font-size: 0.8rem;
        padding: 12px 18px;
      }

      .hero h1 {
        font-size: clamp(2.55rem, 12.5vw, 4rem);
      }

      .hero-sub {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-wrap">
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="process.html">Process</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="location-pill">Jonesboro, Arkansas</div>

        <h1>
          Professional pest<br />
          control for homes<br />
          that want it done<br />
          right every time.
        </h1>

        <p class="hero-sub">
          Safe treatments. Dependable service. Real protection for homeowners
          and renters in Northeast Arkansas.
        </p>

        <div class="hero-actions">
          <a class="hero-btn primary" href="tel:8709197114">Call Now</a>
          <a class="hero-btn secondary" href="services.html">View Services</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
