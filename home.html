<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Season Pest Control | Jonesboro, Arkansas</title>
  <meta
    name="description"
    content="Professional pest control for homes that want it done right every time in Jonesboro, Arkansas."
  />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.88);
      --nav-bg: rgba(0, 0, 0, 0.72);
      --nav-border: rgba(255, 255, 255, 0.08);
      --max: 1400px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page {
      min-height: 100vh;
      background: #000;
    }

    /* LOCKED HEADER */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 26px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 78px;
      flex-wrap: nowrap;
    }

    .nav a {
      color: #ffffff;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      padding: 4px 0;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: calc(100vh - 78px);
      display: flex;
      align-items: stretch;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.72) 0%,
          rgba(0, 0, 0, 0.48) 28%,
          rgba(0, 0, 0, 0.24) 54%,
          rgba(0, 0, 0, 0.38) 100%
        ),
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.24) 0%,
          rgba(0, 0, 0, 0.10) 28%,
          rgba(0, 0, 0, 0.18) 58%,
          rgba(0, 0, 0, 0.44) 100%
        ),
        url("stadium.jpg") center center / cover no-repeat;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 38%, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,0) 65%, rgba(0,0,0,0.18) 100%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 78px 56px 70px;
      display: flex;
      align-items: center;
    }

    .hero-copy {
      width: 100%;
      max-width: 840px;
    }

    .location-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 34px;
      margin-bottom: 34px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      background: rgba(0, 0, 0, 0.18);
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .hero h1 {
      margin: 0 0 22px;
      max-width: 760px;
      color: #ffffff;
      font-size: clamp(4.2rem, 6vw, 5.95rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: -0.065em;
      text-shadow: 0 6px 30px rgba(0, 0, 0, 0.30);
    }

    .hero-sub {
      margin: 0;
      max-width: 860px;
      color: rgba(255, 255, 255, 0.94);
      font-size: 1.08rem;
      line-height: 1.3;
      font-weight: 500;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.30);
    }

    /* DESKTOP TUNING */
    @media (min-width: 1200px) {
      .hero-inner {
        padding-top: 86px;
        padding-bottom: 82px;
      }

      .hero-copy {
        max-width: 860px;
      }

      .hero h1 {
        max-width: 780px;
      }
    }

    /* TABLET */
    @media (max-width: 980px) {
      .topbar-inner {
        padding: 16px 20px;
      }

      .nav {
        gap: 42px;
      }

      .nav a {
        font-size: 1rem;
      }

      .hero {
        min-height: calc(100vh - 70px);
        background-position: center center;
      }

      .hero-inner {
        padding: 62px 30px 54px;
        align-items: flex-start;
      }

      .hero-copy {
        max-width: 760px;
      }

      .location-pill {
        padding: 16px 28px;
        font-size: 1rem;
        margin-bottom: 28px;
      }

      .hero h1 {
        font-size: clamp(3.3rem, 8vw, 5rem);
        max-width: 700px;
      }

      .hero-sub {
        max-width: 680px;
        font-size: 1rem;
      }
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .topbar-inner {
        padding: 16px 14px;
      }

      .nav {
        width: 100%;
        gap: 10px;
        justify-content: space-between;
      }

      .nav a {
        flex: 1 1 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 64px;
        padding: 10px 8px;
        border: 2px solid rgba(255, 45, 45, 0.55);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(20,0,0,0.92), rgba(10,0,0,0.78));
        box-shadow:
          0 0 0 1px rgba(255, 80, 80, 0.08) inset,
          0 0 24px rgba(255, 30, 30, 0.18);
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .nav a.active {
        border-color: rgba(255, 70, 70, 0.95);
        box-shadow:
          0 0 0 1px rgba(255, 110, 110, 0.12) inset,
          0 0 26px rgba(255, 40, 40, 0.38);
      }

      .hero {
        min-height: calc(100vh - 96px);
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.48) 0%,
            rgba(0, 0, 0, 0.38) 22%,
            rgba(0, 0, 0, 0.34) 100%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.55) 0%,
            rgba(0, 0, 0, 0.20) 52%,
            rgba(0, 0, 0, 0.30) 100%
          ),
          url("stadium.jpg") center center / cover no-repeat;
      }

      .hero-inner {
        padding: 34px 20px 42px;
        align-items: flex-start;
      }

      .hero-copy {
        max-width: 100%;
      }

      .location-pill {
        padding: 14px 20px;
        margin-bottom: 24px;
        font-size: 0.86rem;
        letter-spacing: 0.05em;
      }

      .hero h1 {
        max-width: 100%;
        font-size: clamp(3.15rem, 13vw, 4.7rem);
        line-height: 0.95;
        letter-spacing: -0.075em;
        margin-bottom: 16px;
      }

      .hero-sub {
        max-width: 96%;
        font-size: 0.94rem;
        line-height: 1.3;
      }
    }

    @media (max-width: 420px) {
      .nav a {
        min-height: 60px;
        font-size: 0.86rem;
      }

      .hero-inner {
        padding-left: 16px;
        padding-right: 16px;
      }

      .location-pill {
        width: 100%;
        justify-content: center;
      }

      .hero h1 {
        font-size: 2.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <nav class="nav">
          <a href="home.html" class="active">Home</a>
          <a href="services.html">Services</a>
          <a href="process.html">Process</a>
          <a href="about.html">About</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-copy">
            <div class="location-pill">Jonesboro, Arkansas</div>

            <h1>
              Professional pest<br />
              control for homes<br />
              that want it done<br />
              right every time.
            </h1>

            <p class="hero-sub">
              Safe treatments. Dependable service. Real protection for homeowners
              and renters in Northeast Arkansas.
            </p>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
